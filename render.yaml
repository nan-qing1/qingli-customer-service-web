services:
  - type: web
    name: qingli-customer-service-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://wkapi.club/v1
      - key: AI_MODEL
        sync: false
    disk:
      name: qingli-customer-data
      mountPath: /var/data
      sizeGB: 1
