<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>清力技术客服收件箱</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #687486;
      --line: #dce4eb;
      --panel: #fff;
      --soft: #f5f7f9;
      --side: #edf1f5;
      --active: #fff;
      --teal: #087a7c;
      --blue: #315f9f;
      --green: #95ee9e;
      --red: #dd4d4d;
      --gold: #b9852c;
      --shadow: 0 18px 54px rgba(22, 34, 51, 0.12);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; color: var(--ink); }
    body {
      background:
        linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(23, 32, 51, 0.03) 1px, transparent 1px),
        linear-gradient(145deg, #eef7f7, #f8fbff 52%, #ffffff);
      background-size: 42px 42px, 42px 42px, auto;
    }
    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1500px, calc(100vw - 28px));
      height: min(920px, calc(100vh - 28px));
      margin: 14px auto;
      display: grid;
      grid-template-columns: 86px 304px minmax(0, 1fr) 330px;
      overflow: hidden;
      border: 1px solid rgba(207, 218, 227, 0.95);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .rail {
      background: #e8edf1;
      border-right: 1px solid #d8e0e7;
      padding: 16px 10px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 22px rgba(8, 122, 124, 0.2);
    }
    .rail-buttons, .rail-bottom { display: grid; gap: 10px; justify-items: center; align-content: start; }
    .icon-btn {
      position: relative;
      width: 60px;
      height: 42px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: #4e5d70;
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }
    .icon-btn:hover, .icon-btn.active { color: #075f63; background: #fff; transform: translateY(-1px); }
    .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }

    .list-pane {
      min-width: 0;
      background: #f2f5f7;
      border-right: 1px solid #dce3ea;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }
    .list-head { padding: 16px 14px 10px; display: grid; gap: 10px; }
    .search-row { display: grid; grid-template-columns: minmax(0, 1fr) 40px; gap: 10px; align-items: center; }
    .search {
      height: 40px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0 12px;
      outline: none;
      background: #fff;
      color: var(--ink);
    }
    .platform-strip { display: flex; gap: 8px; overflow-x: auto; padding: 0 14px 12px; }
    .platform-tab {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      white-space: nowrap;
      color: #42516a;
      background: #fff;
      border: 1px solid #dde7ee;
      font-size: 13px;
      font-weight: 800;
    }
    .platform-tab.active { color: #fff; background: linear-gradient(135deg, var(--teal), var(--blue)); border-color: transparent; }
    .session-list { min-height: 0; overflow: auto; padding: 0 8px 8px; }
    .session-item {
      width: 100%;
      min-height: 78px;
      border-radius: 12px;
      padding: 10px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: inherit;
      background: transparent;
      text-align: left;
    }
    .session-item:hover, .session-item.active { background: #fff; }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, #60a7a4, #6f88ca);
    }
    .session-main { min-width: 0; }
    .session-title { display: flex; align-items: center; gap: 6px; min-width: 0; font-weight: 900; }
    .session-title span:first-child, .preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .session-meta { display: grid; justify-items: end; gap: 7px; color: #98a2b2; font-size: 12px; }
    .unread-dot {
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }
    .list-foot { padding: 10px 12px 14px; border-top: 1px solid #dce3ea; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }

    .mini-btn, .tool-btn, .primary-btn, .ghost-btn {
      min-height: 38px;
      border-radius: 10px;
      padding: 0 12px;
      font-weight: 900;
    }
    .mini-btn, .tool-btn, .ghost-btn { color: #34445a; background: #fff; border: 1px solid #dde7ee; }
    .primary-btn { color: #fff; background: linear-gradient(135deg, var(--teal), var(--blue)); box-shadow: 0 12px 22px rgba(8, 122, 124, 0.16); }

    .chat-pane { min-width: 0; min-height: 0; display: grid; grid-template-rows: 72px minmax(0, 1fr) 520px; background: #f8fafb; }
    .chat-top {
      border-bottom: 1px solid var(--line);
      padding: 0 18px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(255,255,255,0.9);
    }
    .chat-title h1 { margin: 0; font-size: 20px; line-height: 1.2; }
    .chat-title p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }
    .chat-tools, .quick-tools, .send-actions { display: flex; align-items: center; gap: 8px; }
    .messages {
      min-height: 0;
      overflow: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #fbfcfd;
    }
    .time-divider { align-self: center; color: #97a2b0; font-size: 12px; margin: 2px 0; }
    .message-row { display: flex; gap: 10px; align-items: flex-start; max-width: 76%; }
    .message-row.agent { align-self: flex-end; flex-direction: row-reverse; }
    .bubble {
      position: relative;
      padding: 10px 13px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e4e9ee;
      line-height: 1.65;
      white-space: pre-wrap;
      box-shadow: 0 4px 14px rgba(20, 36, 58, 0.05);
    }
    .message-row.agent .bubble { background: var(--green); border-color: #8bdc96; }
    .bubble small { display: block; margin-top: 6px; color: #788595; font-size: 11px; }

    .composer {
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(9, 122, 124, 0.03), rgba(255,255,255,0) 26%), #fff;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      padding: 14px 16px 16px;
      gap: 10px;
    }
    .composer-tabs, .composer-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tool-btn { min-width: 38px; padding: 0 10px; }
    .reply-workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
      gap: 12px;
    }
    .ai-panel, .reply-shell {
      min-height: 0;
      border: 1px solid #dce7ee;
      border-radius: 16px;
      background: #fafdff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
      overflow: hidden;
    }
    .ai-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
    }
    .ai-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #e5edf3;
      background: #fff;
    }
    .ai-panel-head strong { font-size: 14px; }
    .ai-panel-head span { color: var(--muted); font-size: 12px; }
    .ai-thread {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: linear-gradient(180deg, #fbfdff, #f7fbfc);
    }
    .ai-turn {
      display: grid;
      gap: 6px;
    }
    .ai-turn.user { justify-items: end; }
    .ai-turn.assistant { justify-items: start; }
    .ai-bubble {
      max-width: 92%;
      padding: 9px 11px;
      border-radius: 12px;
      line-height: 1.65;
      font-size: 13px;
      white-space: pre-wrap;
      border: 1px solid #dde7ee;
      background: #fff;
    }
    .ai-turn.user .ai-bubble { background: #eff7ff; border-color: #d7e8ff; }
    .ai-turn.assistant .ai-bubble { background: #fff; }
    .ai-meta { color: var(--muted); font-size: 11px; }
    .ai-entry {
      border-top: 1px solid #e5edf3;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .ai-entry textarea {
      width: 100%;
      min-height: 88px;
      max-height: 140px;
      border: 1px solid #dbe5ec;
      border-radius: 12px;
      outline: none;
      resize: none;
      padding: 10px 12px;
      line-height: 1.6;
      background: #fdfefe;
    }
    .ai-entry-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ai-entry-actions .ghost-btn { min-height: 34px; }
    .reply-shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .reply-shell textarea {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      outline: none;
      resize: none;
      padding: 16px 16px 14px;
      color: var(--ink);
      background: transparent;
      line-height: 1.7;
      font-size: 15px;
    }
    .reply-shell textarea::placeholder { color: #8b97a6; }

    .right-pane { min-width: 0; min-height: 0; border-left: 1px solid #dce3ea; background: #fbfcfd; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    .right-head { min-height: 72px; padding: 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #fff; }
    .right-head strong { display: block; font-size: 17px; }
    .right-head span { color: var(--muted); font-size: 12px; }
    .right-body { min-height: 0; overflow: auto; padding: 14px; display: grid; align-content: start; gap: 12px; }
    .card { border: 1px solid var(--line); border-radius: 14px; padding: 13px; background: #fff; }
    .card h2 { margin: 0 0 10px; font-size: 15px; }
    .info-grid { display: grid; gap: 8px; }
    .info, .suggestion { padding: 9px 10px; border-radius: 10px; background: #f6f9fb; border: 1px solid #e1e9ef; }
    .info span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .info strong, .suggestion strong { display: block; margin-top: 4px; font-size: 13px; line-height: 1.45; }
    .suggestion { text-align: left; }
    .suggestion p { margin: 5px 0 0; color: #526177; font-size: 12px; line-height: 1.6; }
    .action-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .action-link {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #dce7ef;
      background: #fff;
      color: #0f5f66;
      font-size: 12px;
      font-weight: 900;
    }
    .knowledge-preview {
      border: 1px solid #dfe8ef;
      border-radius: 14px;
      background: #f8fbfd;
      overflow: auto;
      max-height: min(62vh, 620px);
      padding: 10px 0;
    }
    .knowledge-line {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      padding: 7px 14px;
      font-family: "Consolas", "SFMono-Regular", "Microsoft YaHei", monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .knowledge-line:nth-child(odd) { background: rgba(255,255,255,0.7); }
    .knowledge-line.hit { background: #e9f7f4; }
    .knowledge-line-num { color: #6e7b88; font-size: 12px; text-align: right; padding-top: 1px; }
    .knowledge-line.hit .knowledge-line-num { color: #0b6a6f; font-weight: 900; }
    .tag {
      display: inline-flex;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      color: #075f63;
      background: #e7f5f3;
      border: 1px solid #c8e5e2;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .tag.gold { color: #8a641f; background: #fff8e8; border-color: #efd9a9; }
    .tag.hot { color: #9a3b3b; background: #fff0ee; border-color: #f1cfca; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(23, 32, 51, 0.88);
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .hidden-file { display: none; }
    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(23, 32, 51, 0.28);
      backdrop-filter: blur(6px);
    }
    .modal-layer.show { display: grid; }
    .modal-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(215, 225, 233, 0.96);
      box-shadow: 0 24px 70px rgba(23, 32, 51, 0.22);
    }
    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      min-height: 62px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--line);
    }
    .modal-head h2 { margin: 0; font-size: 18px; }
    .modal-close {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      color: #536176;
      background: #f4f7f9;
      border: 1px solid #e2e9ef;
      font-weight: 900;
    }
    .modal-body { padding: 16px 18px 18px; display: grid; gap: 10px; }
    .modal-actions { padding: 0 18px 18px; display: flex; justify-content: flex-end; gap: 8px; }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .app { width: 100%; height: auto; min-height: 100vh; margin: 0; border-radius: 0; grid-template-columns: 64px minmax(260px, 320px) minmax(0, 1fr); }
      .right-pane { grid-column: 2 / 4; min-height: 360px; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .rail, .right-pane { display: none; }
      .list-pane { min-height: 330px; }
      .chat-pane { min-height: 640px; }
      .message-row { max-width: 92%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="rail" aria-label="Workbench navigation">
      <div class="logo">&#28165;</div>
      <div class="rail-buttons">
        <button class="icon-btn active" id="navChats" title="&#22810;&#24179;&#21488;&#20250;&#35805;">&#20250;&#35805;<span class="badge" id="totalUnread">0</span></button>
        <button class="icon-btn" id="navCustomers" title="&#23458;&#25143;&#26723;&#26696;">&#23458;&#25143;</button>
        <button class="icon-btn" id="navKnowledge" title="&#30693;&#35782;&#24211;&#20381;&#25454;">&#30693;&#35782;</button>
        <button class="icon-btn" id="navSync" title="&#21516;&#27493;&#29366;&#24577;">&#21516;&#27493;</button>
        <button class="icon-btn" id="navAdmin" title="&#36820;&#22238;&#21518;&#21488;">&#21518;&#21488;</button>
      </div>
      <div class="rail-bottom">
        <button class="icon-btn" id="toggleRightPane" title="&#26174;&#31034;&#25110;&#38544;&#34255;&#21491;&#20391;&#38754;&#26495;">&#21491;&#20391;</button>
      </div>
    </aside>

    <section class="list-pane">
      <div class="list-head">
        <div class="search-row">
          <input class="search" id="sessionSearch" placeholder="&#25628;&#32034;&#23458;&#25143;&#12289;&#24179;&#21488;&#12289;&#38382;&#39064;">
        </div>
      </div>
      <div class="platform-strip" id="platformTabs"></div>
      <div class="session-list" id="sessionList"></div>
      <div class="list-foot">
        <button class="mini-btn" id="refreshData">&#21047;&#26032;&#25968;&#25454;</button>
        <button class="mini-btn" id="onlyUnread">&#21482;&#30475;&#26410;&#35835;</button>
      </div>
    </section>

    <section class="chat-pane">
      <header class="chat-top">
        <div class="chat-title">
          <h1 id="chatTitle">统一收件箱</h1>
          <p id="chatSub">Chatwoot 风格 · 多平台会话聚合 · 基于知识库与 AI 协作回复</p>
        </div>
        <div class="chat-tools">
          <button class="tool-btn" id="openCustomerCard" title="&#26597;&#30475;&#23458;&#25143;&#21345;&#29255;">&#23458;&#25143;&#21345;</button>
          <button class="tool-btn" id="transferHuman" title="&#36716;&#20154;&#24037;&#36319;&#36827;">&#36716;&#20154;&#24037;</button>
          <button class="tool-btn" id="markDoneTop" title="&#26631;&#35760;&#24050;&#22788;&#29702;">&#23436;&#25104;</button>
          <button class="tool-btn" id="copySummary" title="&#22797;&#21046;&#20250;&#35805;&#25688;&#35201;">&#25688;&#35201;</button>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <section class="composer">
        <div class="composer-tabs">
          <div class="quick-tools">
            <button class="tool-btn" id="insertGreeting" title="&#25554;&#20837;&#38382;&#20505;&#35821;">&#38382;&#20505;</button>
            <button class="tool-btn" id="insertLeadText" title="&#25554;&#20837;&#30041;&#36164;&#24341;&#23548;">&#30041;&#36164;</button>
            <button class="tool-btn" id="openKnowledge" title="&#26597;&#30475;&#30693;&#35782;&#24211;&#20381;&#25454;">&#30693;&#35782;&#24211;</button>
            <button class="tool-btn" id="attachFile" title="&#36873;&#25321;&#38468;&#20214;">&#38468;&#20214;</button>
            <input class="hidden-file" id="fileInput" type="file">
          </div>
          <span class="tag" id="replyMode">AI 对话</span>
        </div>
        <div class="reply-workspace">
          <section class="ai-panel" aria-label="AI&#23545;&#35805;">
            <div class="ai-panel-head">
              <strong>AI 交流</strong>
              <span class="tag">先问 AI，再发给客户</span>
            </div>
            <div class="ai-thread" id="aiThread"></div>
            <div class="ai-entry">
              <textarea id="aiPrompt" placeholder="问 AI：比如把这句改得更专业，或者帮我补一段结论。"></textarea>
              <div class="ai-entry-actions">
                <button class="ghost-btn" id="clearAiThread" type="button">&#28165;&#31354;&#23545;&#35805;</button>
                <button class="primary-btn" id="askAi" type="button">&#21457;&#36865;&#32473; AI</button>
              </div>
            </div>
          </section>
          <div class="reply-shell">
            <textarea id="replyText" placeholder="最终发送内容在这里，确认后直接发给客户。"></textarea>
          </div>
        </div>
        <div class="composer-actions">
          <div class="quick-tools">
            <button class="tool-btn" id="generateReply">&#29983;&#25104;&#24314;&#35758;</button>
            <button class="tool-btn" id="polishReply">&#20248;&#21270;&#35821;&#27668;</button>
          </div>
          <div class="send-actions">
            <button class="ghost-btn" id="saveDraft">&#20445;&#23384;&#33609;&#31295;</button>
            <button class="primary-btn" id="sendReply">&#21457;&#36865;</button>
          </div>
        </div>
      </section>
    </section>

    <aside class="right-pane" id="rightPane">
      <header class="right-head">
        <div>
          <strong>Agent &#36741;&#21161;&#38754;&#26495;</strong>
          <span id="rightSub">&#23458;&#25143;&#36164;&#26009;&#12289;&#30693;&#35782;&#20381;&#25454;&#12289;&#21516;&#27493;&#29366;&#24577;</span>
        </div>
        <span class="tag" id="sessionStatusTag">&#24453;&#36873;&#25321;</span>
      </header>
      <div class="right-body">
        <section class="card"><h2>&#23458;&#25143;&#20027;&#26723;&#26696;</h2><div class="info-grid" id="customerProfile"></div></section>
        <section class="card"><h2>&#22238;&#22797;&#24314;&#35758;</h2><div class="info-grid" id="suggestions"></div></section>
        <section class="card"><h2>&#30693;&#35782;&#24211;&#20381;&#25454;</h2><div class="info-grid" id="knowledgeHints"></div></section>
        <section class="card"><h2>&#21516;&#27493;&#35760;&#24405;</h2><div class="info-grid" id="syncLogs"></div></section>
      </div>

        return Array.isArray(value) && value.length ? value : fallback;
      } catch {
        return fallback;
      }
    }
    function loadObject(key, fallback) {
      try {
        const value = JSON.parse(localStorage.getItem(key) || "null");
        return value && typeof value === "object" && !Array.isArray(value) ? value : fallback;
      } catch {
        return fallback;
      }
    }
    function saveLocal() {
      localStorage.setItem(keys.platforms, JSON.stringify(platforms));
      localStorage.setItem(keys.sessions, JSON.stringify(sessions));
      localStorage.setItem(keys.customers, JSON.stringify(customers));
      localStorage.setItem(keys.knowledge, JSON.stringify(knowledge));
      localStorage.setItem(keys.logs, JSON.stringify(logs));
      localStorage.setItem(keys.drafts, JSON.stringify(drafts));
      localStorage.setItem(keys.aiDialogs, JSON.stringify(aiDialogs));
    }
    async function fetchJson(url, options) {
      const response = await fetch(`${API_BASE}${url}`, { cache: "no-store", ...options });
      if (!response.ok) throw new Error("request failed");
      return response.json();
    }
    function applyWorkbenchSnapshot(data = {}) {
      platforms = Array.isArray(data.platforms) && data.platforms.length ? data.platforms : platforms;
      sessions = Array.isArray(data.sessions) && data.sessions.length ? data.sessions : sessions;
      logs = Array.isArray(data.logs) && data.logs.length ? data.logs : logs;
      customers = Array.isArray(data.customers) && data.customers.length ? data.customers : customers;
      knowledge = Array.isArray(data.knowledge) && data.knowledge.length ? data.knowledge : knowledge;
    }
    async function syncWorkbenchState(options = {}) {
      saveLocal();
      try {
        const data = await fetchJson("/api/workbench-state", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ platforms, sessions, logs, customers, knowledge })
        });
        applyWorkbenchSnapshot(data);
        saveLocal();
        return data;
      } catch {
        if (!options.silent) toast("\u5df2\u5148\u4fdd\u5b58\u5230\u672c\u5730\uff0c\u8bf7\u786e\u4fdd\u4f7f\u7528\u670d\u52a1\u5668\u7248\u672c");
        return null;
      }
    }
    async function loadServerData() {
      try {
        const data = await fetchJson("/api/workbench-state");
        if (data && (
          (Array.isArray(data.platforms) && data.platforms.length) ||
          (Array.isArray(data.sessions) && data.sessions.length) ||
          (Array.isArray(data.logs) && data.logs.length) ||
          (Array.isArray(data.customers) && data.customers.length) ||
          (Array.isArray(data.knowledge) && data.knowledge.length)
        )) {
          applyWorkbenchSnapshot(data);
        } else {
          await syncWorkbenchState({ silent: true });
        }
        if (!sessions.some((item) => item.id === selectedSessionId)) selectedSessionId = sessions[0]?.id || "";
        saveLocal();
        render();
        toast(T.toastRefresh);
      } catch {
        render();
        toast(T.toastLocal);
      }
    }
    async function persistSessions() {
      await syncWorkbenchState();
    }
    function currentSession() {
      return sessions.find((item) => item.id === selectedSessionId) || sessions[0] || null;
    }
    function currentCustomer() {
      const session = currentSession();
      return customers.find((item) => item.id === session?.customerId) || null;
    }
    function currentAiThread() {
      const session = currentSession();
      if (!session) return [];
      return Array.isArray(aiDialogs[session.id]) ? aiDialogs[session.id] : [];
    }
    function platformName(id) {
      return platforms.find((item) => item.id === id)?.name || id || "\u672a\u77e5\u5e73\u53f0";
    }
    function visibleSessions() {
      const keyword = $("#sessionSearch").value.trim().toLowerCase();
      return sessions.filter((item) => {
        const platformMatch = selectedPlatform === "all" || item.platformId === selectedPlatform;
        const unreadMatch = !unreadOnly || Number(item.unread || 0) > 0;
        const text = [item.platformName, item.customerName, item.title, item.summary, item.status].join(" ").toLowerCase();
        return platformMatch && unreadMatch && (!keyword || text.includes(keyword));
      });
    }
    function avatarText(value) {
      return String(value || "\u5ba2").trim().slice(0, 1).toUpperCase();
    }
    function nowText() {
      return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    function escapeHtml(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function stripPunctuation(text) {
      return String(text || "").replace(/[锛屻€傦紒锛燂紱锛氥€?.;:!?()锛堬級銆愩€慭[\]<>銆娿€嬧€溾€?'`~\s]/g, " ").trim();
    }
    function keywordsFrom(text) {
      return stripPunctuation(text)
        .split(/\s+/)
        .map((item) => item.trim())
        .filter((item) => item && item.length > 1)
        .slice(0, 6);
    }
    function hashSeed(text) {
      return String(text || "").split("").reduce((sum, ch) => ((sum * 33) ^ ch.charCodeAt(0)) >>> 0, 5381);
    }
    function choose(list, seedText) {
      const items = Array.isArray(list) ? list.filter(Boolean) : [];
      if (!items.length) return "";
      const seed = hashSeed(seedText);
      return items[seed % items.length];
    }
    function appendAiTurn(role, text) {
      const session = currentSession();
      if (!session) return;
      const id = session.id;
      aiDialogs[id] = Array.isArray(aiDialogs[id]) ? aiDialogs[id] : [];
      aiDialogs[id].push({
        role,
        text: String(text || "").trim(),
        at: nowText()
      });
      if (aiDialogs[id].length > 20) aiDialogs[id] = aiDialogs[id].slice(-20);
      saveLocal();
    }
    function composeAiAnswer(prompt) {
      const session = currentSession();
      const customer = currentCustomer();
      const focus = [prompt, customer?.focus, session?.summary, session?.title].filter(Boolean).join(" ");
      const kb = knowledgeMatch(focus);
      const seed = `${session?.id || ""}|${focus}|${session?.platformId || ""}|${draftVariant}`;
      const lead = choose([
        `可以直接这样回复：`,
        `这句可以整理成：`,
        `给客户的话可以写成：`
      ], seed);
      const core = kb
        ? choose([
            `根据\u300c${kb.title}\u300d，${compactSentence(kb.clean, 96) || "可以先把原理讲清，再补上适用场景"}。`,
            `结合\u300c${kb.title}\u300d，${compactSentence(kb.clean, 96) || "先说明原理，再说明应用场景"}。`,
            `这条可以参考\u300c${kb.title}\u300d，${compactSentence(kb.clean, 96) || "直接给出结论，再补充一句场景说明"}。`
          ], seed + 1)
        : choose([
            `先给出结论，再补一句适用场景，会更清楚。`,
            `先讲结果，再讲原因，客户会更容易看懂。`,
            `可以用“结论 + 场景 + 下一步”这种结构。`
          ], seed + 1);
      const closing = choose([
        `如果你愿意，我还可以继续把这句压得更短一点。`,
        `如果想更正式一点，我也可以再改一版。`,
        `需要的话，我可以继续帮你改成更适合当前平台的口吻。`
      ], seed + 2);
      return polishCustomerReply([lead, core, closing].join("\n\n"));
    }
    function renderAiThread() {
      const thread = currentAiThread();
      $("#aiThread").innerHTML = thread.length ? thread.map((turn) => `
        <div class="ai-turn ${turn.role === "user" ? "user" : "assistant"}">
          <div class="ai-bubble">${escapeHtml(turn.text || "")}</div>
          <div class="ai-meta">${turn.role === "user" ? "你" : "AI"} · ${escapeHtml(turn.at || "")}</div>
        </div>
      `).join("") : `
        <div class="info">
          <span>AI 交流</span>
          <strong>先输入一句需求，AI 会给你一版能直接发给客户的话。</strong>
        </div>
      `;
      const box = $("#aiThread");
      box.scrollTop = box.scrollHeight;
    }
    function compactSentence(text, limit = 90) {
      const value = String(text || "")
        .replace(/\s+/g, " ")
        .replace(/^[「『“]|[」』”]$/g, "")
        .trim();
      if (!value) return "";
      const sentence = value.split(/[。！？!?]/).map((item) => item.trim()).find(Boolean) || value;
      return sentence.slice(0, limit).trim();
    }
    function polishCustomerReply(text) {
      let value = String(text || "").replace(/\r/g, "").trim();
      if (!value) return "";
      const lines = value.split("\n").map((line) => line.trim()).filter(Boolean);
      const cleaned = [];
      const metaStarts = /^(参考|这样答就行|可直接回复|建议这样说|回复可写成|客服话术|内部备注|你可以这样说|可直接发给客户|下面这段|先说|可以先|先把|我会|我们可以|你可以)/;
      for (const line of lines) {
        const stripped = line
          .replace(/^（?内容由AI生成）?/, "")
          .replace(/^（?AI生成）?/, "")
          .trim();
        if (!stripped) continue;
        if (metaStarts.test(stripped)) {
          const tail = stripped
            .replace(metaStarts, "")
            .replace(/^[:：\-—\s]+/, "")
            .trim();
          if (tail) cleaned.push(tail);
          continue;
        }
        cleaned.push(stripped);
      }
      value = cleaned.join("\n");
      value = value
        .replace(/^\s*(参考|这样答就行|可直接回复|建议这样说|回复可写成|客服话术|内部备注)[:：]\s*/g, "")
        .replace(/(我会|我们可以|你可以|可以先|先说|先把|建议这样说|这样答就行|可直接回复|回复可写成|客服话术|内部备注)/g, "")
        .replace(/[ \t]{2,}/g, " ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
      return value;
    }
    function knowledgeMatch(topic) {
      const tokens = keywordsFrom(topic).map((item) => item.toLowerCase());
      const scored = knowledge.map((item) => {
        const pool = [item.title, item.category, item.source, item.clean].join(" ").toLowerCase();
        const score = tokens.reduce((sum, token) => sum + (pool.includes(token) ? 1 : 0), 0);
        return { ...item, score };
      }).filter((item) => item.score > 0).sort((a, b) => b.score - a.score);
      return scored[0] || knowledge.find((item) => !item.status || item.status === "\u5df2\u53d1\u5e03") || null;
    }
    async function openKnowledgePreview(item, query = "") {
      if (!item) return toast("\u6682\u65e0\u53ef\u6253\u5f00\u7684\u77e5\u8bc6\u8d44\u6599");
      try {
        const data = await fetchJson(`/api/public/knowledge/${encodeURIComponent(item.id)}/content?q=${encodeURIComponent(query || "")}`);
        const preview = Array.isArray(data.preview) ? data.preview : [];
        const matchedLine = Number(data.matchedLine || 0);
        const title = escapeHtml(data.item?.title || item.title || item.fileName || "\u77e5\u8bc6\u8d44\u6599");
        const meta = [
          data.item?.category || item.category || "\u672a\u5206\u7c7b",
          data.item?.source || item.source || "\u672a\u77e5\u6765\u6e90",
          `L${matchedLine || 1}`
        ].join(" \u00b7 ");
        const body = `
          <div class="info"><span>\u6587\u6863</span><strong>${title}</strong></div>
          <div class="info"><span>\u6807\u7b7e</span><strong>${escapeHtml(meta)}</strong></div>
          <div class="action-row">
            <button class="action-link" id="kbOpenDownload" type="button">\u6253\u5f00/\u4e0b\u8f7d\u539f\u6587</button>
          </div>
          <div class="knowledge-preview" id="knowledgePreviewBox">
            ${preview.map((line) => `
              <div class="knowledge-line ${line.line === matchedLine ? "hit" : ""}" data-kb-line="${line.line}">
                <div class="knowledge-line-num">${line.line}</div>

      const session = currentSession();
      if (!session) return;
      session.messages = Array.isArray(session.messages) ? session.messages : [];
      const message = { id: `M-${Date.now().toString().slice(-8)}`, direction: "agent", text, at: nowText(), author: T.agent };
      session.messages.push(message);
      session.status = T.replied;
      session.unread = 0;
      session.lastMessageAt = nowText();
      session.summary = session.summary || text.slice(0, 40);
      drafts[session.id] = "";
      saveLocal();
      await syncWorkbenchState();
      render();
    }
    $("#sessionSearch").addEventListener("input", renderSessionList);
    $("#refreshData").addEventListener("click", loadServerData);
    $("#onlyUnread").addEventListener("click", () => {
      unreadOnly = !unreadOnly;
      $("#onlyUnread").textContent = unreadOnly ? "\u67e5\u770b\u5168\u90e8" : "\u53ea\u770b\u672a\u8bfb";
      render();
    });
    $("#generateReply").addEventListener("click", () => {
      draftVariant += 1;
      $("#replyText").value = buildDraft();
      toast(T.generate);
    });
    $("#askAi").addEventListener("click", () => {
      const prompt = $("#aiPrompt").value.trim();
      if (!prompt) return toast("先输入一个问题");
      appendAiTurn("user", prompt);
      const answer = composeAiAnswer(prompt);
      appendAiTurn("assistant", answer);
      $("#replyText").value = answer;
      const session = currentSession();
      if (session) {
        drafts[session.id] = answer;
      }
      saveLocal();
      render();
      $("#aiPrompt").value = "";
      toast("AI 已生成可发送内容");
    });
    $("#aiPrompt").addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        event.preventDefault();
        $("#askAi").click();
      }
    });
    $("#clearAiThread").addEventListener("click", () => {
      const session = currentSession();
      if (!session) return;
      aiDialogs[session.id] = [];
      saveLocal();
      render();
      toast("已清空 AI 对话");
    });
    $("#polishReply").addEventListener("click", () => {
      const text = $("#replyText").value.trim();
      if (!text) return toast(T.needText);
      $("#replyText").value = polishCustomerReply(`${text}\n\n\u5982\u679c\u8fd8\u9700\u8981\u66f4\u7ec6\u7684\u7248\u672c\uff0c\u53ef\u4ee5\u76f4\u63a5\u8865\u4e00\u53e5\u4f7f\u7528\u573a\u666f\u3002`);
      toast("\u5df2\u4f18\u5316\u8bed\u6c14");
    });
    $("#sendReply").addEventListener("click", async () => {
      const text = $("#replyText").value.trim();
      if (!text) return toast(T.needReply);
      await appendAgentMessage(text);
      $("#replyText").value = "";
      toast(T.sent);
    });
    $("#saveDraft").addEventListener("click", () => {
      const session = currentSession();
      if (!session) return;
      drafts[session.id] = $("#replyText").value;
      saveLocal();
      toast(T.draftSaved);
    });
    $("#insertGreeting").addEventListener("click", () => {
      $("#replyText").value += ($("#replyText").value ? "\n" : "") + "\u4eb2\uff0c\u6b22\u8fce\u54a8\u8be2\u6df1\u5733\u6e05\u529b\u6280\u672f\u6709\u9650\u516c\u53f8~";
    });
    $("#insertLeadText").addEventListener("click", () => {
      $("#replyText").value += ($("#replyText").value ? "\n" : "") + "\u5982\u679c\u60a8\u65b9\u4fbf\uff0c\u53ef\u4ee5\u8fdb\u4e00\u6b65\u8865\u5145\u79f0\u547c\u3001\u8054\u7cfb\u65b9\u5f0f\u548c\u9700\u8981\u4ea4\u6d41\u7684\u5185\u5bb9\u3002";
    });
    $("#openKnowledge").addEventListener("click", () => {
      const session = currentSession();
      const focus = currentCustomer()?.focus || session?.summary || session?.title || "";
      openKnowledgePreview(knowledgeMatch(focus), focus);
    });
    $("#attachFile").addEventListener("click", () => $("#fileInput").click());
    $("#fileInput").addEventListener("change", (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      $("#replyText").value += ($("#replyText").value ? "\n" : "") + `\u5df2\u9009\u62e9\u9644\u4ef6\uff1a${file.name}`;
      toast("\u9644\u4ef6\u5df2\u52a0\u5165\u5f53\u524d\u56de\u590d\u8bf4\u660e");
    });
    $("#openCustomerCard").addEventListener("click", async () => {
      const session = currentSession();
      if (!session) return toast("\u8bf7\u5148\u9009\u62e9\u4e00\u4e2a\u4f1a\u8bdd");
      let customer = currentCustomer();
      if (!customer) {
        customer = upsertLocalCustomer({
          id: session.customerId || `C-${Date.now().toString().slice(-8)}`,
          name: session.customerName || "\u672a\u547d\u540d\u5ba2\u6237",
          company: "\u672a\u77e5",
          contact: "",
          industry: "\u672a\u77e5",
          needType: session.title || "\u5e73\u53f0\u54a8\u8be2",
          focus: session.summary || "\u5f85\u6574\u7406",
          stage: session.status || T.wait,
          risk: "\u4f4e",
          source: platformName(session.platformId),
          sessionId: session.id,
          createdAt: new Date().toLocaleString("zh-CN", { hour12: false })
        });
        session.customerId = customer.id;
        session.customerName = customer.name;
        await persistCustomers();
        await persistSessionPatch(session, { customerId: customer.id, customerName: customer.name });
      }
      showModal("\u5ba2\u6237\u8d44\u6599\u5361", `
        <div class="info"><span>\u5ba2\u6237ID / \u59d3\u540d</span><strong>${escapeHtml(customer.id)} \u00b7 ${escapeHtml(customer.name || "\u672a\u547d\u540d")}</strong></div>
        <div class="info"><span>\u6765\u6e90\u5e73\u53f0 / \u4f1a\u8bdd</span><strong>${escapeHtml(platformName(session.platformId))} \u00b7 ${escapeHtml(session.title || "")}</strong></div>
        <div class="info"><span>\u516c\u53f8 / \u884c\u4e1a</span><strong>${escapeHtml(customer.company || "\u672a\u77e5")} \u00b7 ${escapeHtml(customer.industry || "\u672a\u77e5")}</strong></div>
        <div class="info"><span>\u8054\u7cfb\u65b9\u5f0f</span><strong>${escapeHtml(customer.contact || "\u672a\u63d0\u4ea4")}</strong></div>
        <div class="info"><span>\u9700\u6c42\u7c7b\u578b / \u5173\u6ce8\u70b9</span><strong>${escapeHtml(customer.needType || "\u5e73\u53f0\u54a8\u8be2")} \u00b7 ${escapeHtml(customer.focus || session.summary || "\u5f85\u6574\u7406")}</strong></div>
        <div class="info"><span>\u8ddf\u8fdb\u9636\u6bb5 / \u98ce\u9669</span><strong>${escapeHtml(customer.stage || session.status || T.wait)} \u00b7 ${escapeHtml(customer.risk || "\u4f4e")}</strong></div>
        <div class="info"><span>\u5907\u6ce8</span><strong>${escapeHtml(customer.note || "\u6682\u65e0")}</strong></div>
      `, `<button class="ghost-btn" id="modalGoAdmin" type="button">\u53bb\u540e\u53f0\u67e5\u770b</button><button class="primary-btn" id="modalOk" type="button">\u786e\u8ba4</button>`);
      $("#modalOk").addEventListener("click", closeModal);
      $("#modalGoAdmin").addEventListener("click", () => { window.location.href = "/admin"; });
      render();
      toast("\u5ba2\u6237\u5361\u5df2\u8fde\u63a5\u5ba2\u6237\u6570\u636e\u5e93");
    });
    $("#transferHuman").addEventListener("click", async () => {
      const session = currentSession();
      if (!session) return;
      await persistSessionPatch(session, { status: T.human, unread: 0 }, { id: `PL-${Date.now().toString().slice(-8)}`, platformId: session.platformId, level: "warn", text: `${session.title} \u5df2\u8f6c\u4eba\u5de5\u8ddf\u8fdb`, at: nowText() });
      const customer = currentCustomer();
      if (customer) {
        customer.stage = "\u5df2\u8f6c\u4eba\u5de5";
        await persistCustomers();
      }
      render();
      toast("\u5df2\u5199\u5165\u540e\u7aef\uff1a\u5f53\u524d\u4f1a\u8bdd\u8f6c\u4eba\u5de5");
    });
    async function markDone() {
      const session = currentSession();
      if (!session) return;
      await persistSessionPatch(session, { status: T.done, unread: 0 }, { id: `PL-${Date.now().toString().slice(-8)}`, platformId: session.platformId, level: "success", text: `${session.title} \u5df2\u5904\u7406\u5b8c\u6210`, at: nowText() });
      const customer = currentCustomer();
      if (customer) {
        customer.stage = "\u5df2\u5904\u7406";
        await persistCustomers();
      }
      render();
      toast("\u5df2\u5199\u5165\u540e\u7aef\uff1a\u4f1a\u8bdd\u5df2\u5904\u7406");
    }
    $("#markDoneTop").addEventListener("click", markDone);
    $("#copySummary").addEventListener("click", async () => {
      const session = currentSession();
      if (!session) return;
      const text = buildSessionSummary(session);
      showModal("\u4f1a\u8bdd\u6458\u8981", `<div class="info"><span>\u5df2\u6839\u636e\u5f53\u524d\u4f1a\u8bdd\u751f\u6210</span><strong style="white-space:pre-wrap;">${escapeHtml(text)}</strong></div>`, `<button class="ghost-btn" id="summarySave" type="button">\u4fdd\u5b58\u5230\u4f1a\u8bdd</button><button class="primary-btn" id="summaryCopy" type="button">\u590d\u5236\u6458\u8981</button>`);
      $("#summarySave").addEventListener("click", async () => {
        const nextSummary = (session.summary || text.split("\n").slice(0, 6).join(" ")).slice(0, 120);
        await persistSessionPatch(session, { summary: nextSummary }, { id: `PL-${Date.now().toString().slice(-8)}`, platformId: session.platformId, level: "info", text: `${session.title} \u5df2\u66f4\u65b0\u4f1a\u8bdd\u6458\u8981`, at: nowText() });
        render();
        closeModal();
        toast("\u6458\u8981\u5df2\u4fdd\u5b58\u5230\u540e\u7aef\u4f1a\u8bdd");
      });
      $("#summaryCopy").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(text);
          toast("\u4f1a\u8bdd\u6458\u8981\u5df2\u590d\u5236");
        } catch {
          $("#replyText").value = text;
          toast("\u5df2\u586b\u5165\u8f93\u5165\u6846\uff0c\u53ef\u624b\u52a8\u590d\u5236");
        }
      });
      try {
        await navigator.clipboard.writeText(text);
        toast("\u4f1a\u8bdd\u6458\u8981\u5df2\u751f\u6210\u5e76\u590d\u5236");
      } catch {
        toast("\u4f1a\u8bdd\u6458\u8981\u5df2\u751f\u6210");
      }
    });
    $("#modalClose").addEventListener("click", closeModal);
    $("#modalLayer").addEventListener("click", (event) => {
      if (event.target === $("#modalLayer")) closeModal();
    });
    $("#navAdmin").addEventListener("click", () => { window.location.href = "/admin"; });
    $("#navCustomers").addEventListener("click", () => $("#customerProfile").scrollIntoView({ behavior: "smooth", block: "center" }));
    $("#navKnowledge").addEventListener("click", () => $("#knowledgeHints").scrollIntoView({ behavior: "smooth", block: "center" }));
    $("#navSync").addEventListener("click", () => $("#syncLogs").scrollIntoView({ behavior: "smooth", block: "center" }));
    $("#toggleRightPane").addEventListener("click", () => {
      const pane = $("#rightPane");
      pane.style.display = pane.style.display === "none" ? "" : "none";
      toast(pane.style.display === "none" ? "\u5df2\u9690\u85cf\u53f3\u4fa7\u9762\u677f" : "\u5df2\u663e\u793a\u53f3\u4fa7\u9762\u677f");
    });
    $("#replyText").addEventListener("input", () => {
      const session = currentSession();
      if (!session) return;
      drafts[session.id] = $("#replyText").value;
      localStorage.setItem(keys.drafts, JSON.stringify(drafts));
    });
    render();
    renderDraft();
    loadServerData();
  </script>
</body>
</html>
