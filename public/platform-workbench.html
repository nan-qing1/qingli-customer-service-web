<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>清力统一多平台客服中台</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --line: #d8e1e8;
      --ink: #172033;
      --muted: #657286;
      --teal: #0a7b7d;
      --teal-deep: #075f63;
      --blue: #315f9f;
      --green: #2b8a69;
      --amber: #b8831e;
      --red: #bf4d4d;
      --shadow: 0 18px 48px rgba(23, 32, 51, 0.10);
      --shadow-strong: 0 24px 70px rgba(23, 32, 51, 0.14);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(23, 32, 51, 0.03) 1px, transparent 1px),
        linear-gradient(145deg, #eef7f7 0%, #f8fbff 52%, #ffffff 100%);
      background-size: 42px 42px, 42px 42px, auto;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .app {
      width: min(1520px, calc(100vw - 28px));
      height: min(920px, calc(100vh - 28px));
      margin: 14px auto;
      display: grid;
      grid-template-columns: 88px 302px minmax(0, 1fr) 344px;
      border: 1px solid rgba(209, 220, 229, 0.95);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(18px);
    }

    .rail {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 14px 10px;
      background: #e9eef2;
      border-right: 1px solid var(--line);
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 24px rgba(10, 123, 125, 0.2);
      font-weight: 900;
      font-size: 18px;
      margin: 2px auto 0;
    }

    .rail-group { display: grid; gap: 10px; align-content: start; justify-items: center; }

    .rail-btn {
      position: relative;
      width: 60px;
      height: 42px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: transparent;
      color: #4d5d72;
      font-size: 13px;
      font-weight: 850;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .rail-btn:hover, .rail-btn.active {
      background: #ffffff;
      color: var(--teal-deep);
      border-color: rgba(8, 122, 124, 0.12);
      transform: translateY(-1px);
    }

    .rail-dot {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }

    .list-pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--line);
      background: #f4f7f9;
    }

    .list-head {
      padding: 14px 14px 10px;
      display: grid;
      gap: 10px;
    }

    .list-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .list-title h1 { margin: 0; font-size: 18px; line-height: 1.2; letter-spacing: 0; }
    .list-title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px;
      gap: 8px;
      align-items: center;
    }

    .search {
      height: 40px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0 12px;
      outline: none;
      color: var(--ink);
      background: #fff;
      box-shadow: 0 8px 20px rgba(23, 32, 51, 0.04);
    }

    .search::placeholder { color: #8b96a4; }

    .small-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 0 14px 10px;
    }

    .metric {
      min-height: 64px;
      padding: 10px 11px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f8fbfd);
    }

    .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .metric strong { display: block; margin-top: 7px; font-size: 19px; line-height: 1; }

    .platform-strip {
      padding: 0 14px 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .platform-strip::-webkit-scrollbar { display: none; }

    .platform-tab {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid #dde7ee;
      background: #fff;
      color: #425168;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .platform-tab.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 24px rgba(8, 122, 124, 0.16);
    }

    .session-list {
      min-height: 0;
      overflow: auto;
      padding: 0 8px 10px;
      display: grid;
      gap: 6px;
    }

    .session-item {
      width: 100%;
      min-height: 80px;
      border: 0;
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      text-align: left;
      background: transparent;
      color: inherit;
      transition: background 160ms ease, transform 160ms ease;
    }

    .session-item:hover, .session-item.active {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(23, 32, 51, 0.07);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, #5aa6a2, #6986c5);
    }

    .session-main { min-width: 0; }
    .session-title { display: flex; align-items: center; gap: 6px; min-width: 0; font-weight: 900; font-size: 14px; }
    .session-title span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-preview {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-meta {
      display: grid;
      justify-items: end;
      gap: 7px;
      color: #93a0b0;
      font-size: 12px;
    }

    .session-unread {
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }

    .list-foot {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
    }

    .btn.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 22px rgba(8, 122, 124, 0.14);
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      background: #f8fafb;
    }

    .chat-top {
      padding: 16px 18px 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .chat-title h2 { margin: 0; font-size: 21px; line-height: 1.15; letter-spacing: 0; }
    .chat-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .chat-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #d8e8e6;
      background: #edf9f7;
      color: var(--teal-deep);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .banner {
      margin: 12px 14px 0;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid #cfe2ee;
      background: linear-gradient(135deg, #eefaf8, #f4f8ff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(23, 32, 51, 0.04);
    }

    .banner strong { display: block; font-size: 14px; line-height: 1.3; }
    .banner small { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.4; }

    .chat-body {
      min-height: 0;
      padding: 14px 22px 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fbfcfd;
    }

    .time-divider { align-self: center; color: #97a2b0; font-size: 12px; margin: 2px 0; }
    .bubble-row { display: flex; align-items: flex-start; gap: 10px; max-width: 76%; }
    .bubble-row.agent { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      min-width: 0;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid #e4e9ef;
      background: #fff;
      line-height: 1.65;
      white-space: pre-wrap;
      box-shadow: 0 4px 14px rgba(20, 36, 58, 0.05);
    }

    .bubble-row.agent .bubble { border-color: rgba(43, 138, 105, 0.18); background: linear-gradient(135deg, rgba(10, 123, 125, 0.12), rgba(49, 95, 159, 0.10)); }
    .bubble small { display: block; margin-top: 6px; color: #788595; font-size: 11px; }

    .composer {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 123, 125, 0.03), rgba(255,255,255,0) 24%), #fff;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
    }

    .composer-top, .composer-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .composer-tools { display: flex; gap: 8px; flex-wrap: wrap; }

    .tool-btn {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
    }

    .reply-shell {
      min-height: 0;
      border: 1px solid #dce7ee;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .reply-shell header {
      min-height: 44px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #e5edf3;
      background: #fafdff;
      font-size: 13px;
      font-weight: 850;
    }

    .reply-shell textarea {
      width: 100%;
      min-height: 94px;
      padding: 14px 15px;
      border: 0;
      outline: none;
      resize: none;
      line-height: 1.7;
      color: var(--ink);
      background: transparent;
    }

    .reply-shell textarea::placeholder { color: #8c98a7; }

    .right-pane {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: #fafbfc;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .right-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .right-head strong { display: block; font-size: 17px; }
    .right-head span { color: var(--muted); font-size: 12px; }

    .right-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(23, 32, 51, 0.04);
      overflow: hidden;
    }

    .panel h3 { margin: 0; font-size: 14px; line-height: 1.2; }
    .panel-head {
      min-height: 50px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
    }

    .panel-body { padding: 12px 14px 14px; }

    .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .summary {
      min-height: 72px;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid #dbe6ee;
      background: linear-gradient(180deg, #fff, #f7fafc);
    }

    .summary span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .summary strong { display: block; margin-top: 6px; font-size: 14px; line-height: 1.45; }

    .stack { display: grid; gap: 8px; }
    .stack-item {
      padding: 10px 11px;
      border: 1px solid #e2eaf0;
      border-radius: 12px;
      background: #f8fbfd;
    }

    .stack-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .stack-item strong { display: block; margin-top: 5px; font-size: 13px; line-height: 1.5; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid #d9e4ec;
      background: #fff;
      color: #34455d;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .tag.success { color: #176447; background: #e9f7f0; border-color: #cce8dc; }
    .tag.warn { color: #8a641f; background: #fff8e8; border-color: #efd9a9; }
    .tag.hot { color: #9a3b3b; background: #fff0ee; border-color: #f1cfca; }
    .tag.blue { color: #244f91; background: #edf4ff; border-color: #cfdff5; }

    .log-list { display: grid; gap: 8px; }
    .log-item {
      padding: 10px 11px;
      border: 1px solid #e2eaf0;
      border-radius: 12px;
      background: #fff;
    }

    .log-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .log-item strong { display: block; margin-top: 5px; font-size: 13px; line-height: 1.5; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(23, 32, 51, 0.88);
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      font-size: 13px;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(23, 32, 51, 0.28);
      backdrop-filter: blur(8px);
    }
    .modal-layer.show { display: grid; }
    .modal-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(215, 225, 233, 0.96);
      background: #fff;
      box-shadow: 0 24px 70px rgba(23, 32, 51, 0.22);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      min-height: 62px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3 { margin: 0; font-size: 18px; }
    .modal-close {
      width: 34px;
      height: 34px;
      border: 1px solid #e2e9ef;
      border-radius: 10px;
      background: #f4f7f9;
      color: #536176;
      font-weight: 900;
    }

    .modal-body { padding: 16px 18px 18px; display: grid; gap: 10px; }
    .modal-actions { padding: 0 18px 18px; display: flex; justify-content: flex-end; gap: 8px; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field { display: grid; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    .field label { color: #405065; font-size: 13px; font-weight: 800; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fbfdff;
      outline: none;
    }
    .field textarea { min-height: 72px; resize: vertical; }
    .field input:focus, .field textarea:focus, .field select:focus,
    .search:focus, .reply-shell textarea:focus {
      border-color: rgba(8, 122, 124, 0.55);
      box-shadow: 0 0 0 3px rgba(8, 122, 124, 0.10);
      background: #fff;
    }

    @media (max-width: 1280px) {
      body { overflow: auto; }
      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        grid-template-columns: 76px 280px minmax(0, 1fr);
      }
      .right-pane { grid-column: 2 / 4; border-left: 0; border-top: 1px solid var(--line); min-height: 360px; }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .rail, .right-pane { display: none; }
      .list-pane { min-height: 320px; }
      .workspace { min-height: 620px; }
      .bubble-row { max-width: 92%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="rail" aria-label="导航">
      <div class="brand-mark">清</div>
      <div class="rail-group">
        <button class="rail-btn active" id="navInbox">会话<span class="rail-dot" id="unreadBadge">0</span></button>
        <button class="rail-btn" id="navCustomers">客户</button>
        <button class="rail-btn" id="navKnowledge">知识</button>
        <button class="rail-btn" id="navSync">同步</button>
        <button class="rail-btn" id="navAdmin">后台</button>
      </div>
      <div class="rail-group">
        <button class="rail-btn" id="toggleRight">右栏</button>
      </div>
    </aside>

    <section class="list-pane">
      <div class="list-head">
        <div class="list-title">
          <div>
            <h1>统一收件箱</h1>
            <p>多平台会话收口 · 知识驱动回复 · 人工接手</p>
          </div>
          <span class="pill" id="activePlatformPill">全部平台</span>
        </div>
        <div class="search-row">
          <input class="search" id="searchInput" placeholder="搜索客户、平台、问题">
          <button class="small-icon" id="refreshState" title="刷新">↻</button>
        </div>
      </div>

      <div class="metric-row" aria-label="概览指标">
        <div class="metric"><span>未读</span><strong id="metricUnread">0</strong></div>
        <div class="metric"><span>待人工</span><strong id="metricHuman">0</strong></div>
        <div class="metric"><span>平台</span><strong id="metricPlatforms">0</strong></div>
      </div>

      <div class="platform-strip" id="platformTabs"></div>
      <div class="session-list" id="sessionList"></div>
      <div class="list-foot">
        <button class="btn" id="toggleUnread">只看未读</button>
        <button class="btn primary" id="newSummary">生成摘要</button>
      </div>
    </section>

    <section class="workspace">
      <header class="chat-top">
        <div class="chat-title">
          <h2 id="chatTitle">统一收件箱</h2>
          <p id="chatSub">Chatwoot 底座 · 统一 Agent 路由 · 平台消息统一处理</p>
        </div>
        <div class="chat-actions">
          <button class="btn" id="btnCustomer">客户卡</button>
          <button class="btn" id="btnAi">AI 辅助</button>
          <button class="btn" id="btnHuman">转人工</button>
          <button class="btn primary" id="btnDone">完成</button>
        </div>
      </header>

      <div class="banner" id="bridgeBanner">
        <div>
          <strong id="bannerTitle">已接入统一工作流</strong>
          <small id="bannerText">平台消息先进收件箱，再由同一套 Agent、知识库与人工接手处理。</small>
        </div>
        <span class="pill" id="bannerState">在线</span>
      </div>

      <div class="chat-body" id="chatBody"></div>

      <div class="composer">
        <div class="composer-top">
          <div class="composer-tools">
            <button class="tool-btn" id="insertGreet">问候</button>
            <button class="tool-btn" id="insertLead">留资</button>
            <button class="tool-btn" id="insertKb">知识</button>
            <button class="tool-btn" id="insertHuman">人工说明</button>
          </div>
          <div class="tag-row" id="composerTags"></div>
        </div>
        <div class="reply-shell">
          <header><span>回复草稿</span><span id="draftHint">可直接发送到当前会话</span></header>
          <textarea id="replyInput" placeholder="在这里写回复，或用右侧 AI 辅助生成草稿"></textarea>
        </div>
        <div class="composer-actions">
          <button class="btn" id="saveDraft">保存草稿</button>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <button class="btn" id="copySummary">复制摘要</button>
            <button class="btn primary" id="sendReply">发送回复</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="right-pane" id="rightPane">
      <div class="right-head">
        <div>
          <strong>AI / 客户 / 同步</strong>
          <span>围绕当前会话的辅助面板</span>
        </div>
        <span class="pill" id="rightState">实时</span>
      </div>
      <div class="right-body">
        <section class="panel">
          <div class="panel-head"><h3>客户概览</h3><span class="tag blue" id="customerStageTag">新线索</span></div>
          <div class="panel-body"><div class="summary-grid" id="customerSummary"></div></div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>AI 路由</h3><span class="tag success" id="routeTag">知识优先</span></div>
          <div class="panel-body">
            <div class="stack" id="routeStack"></div>
            <div class="tag-row" id="kbTags" style="margin-top:10px;"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>知识候选</h3><button class="btn" id="openKnowledge">查看</button></div>
          <div class="panel-body"><div class="stack" id="knowledgePreview"></div></div>
        </section>

        <section class="panel">
          <div class="panel-head"><h3>同步日志</h3><span class="tag warn" id="syncStatusTag">最近同步</span></div>
          <div class="panel-body"><div class="log-list" id="logList"></div></div>
        </section>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast"></div>
  <div class="modal-layer" id="modalLayer" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle">窗口</h3>
        <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <script>
    const state = {
      platforms: [], sessions: [], logs: [], customers: [], knowledge: [], integrations: {},
      selectedPlatform: "all", selectedSessionId: "", search: "", unreadOnly: false,
      drafts: {}, rightVisible: true
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;");

    function nowText() { return new Date().toLocaleString("zh-CN", { hour12: false }); }
    function initials(name) { const clean = String(name || "").trim(); return clean ? clean.slice(0, 2) : "未"; }
    function platformName(id) { return state.platforms.find((entry) => entry.id === id)?.name || id || "未命名平台"; }
    function currentSession() { return state.sessions.find((item) => item.id === state.selectedSessionId) || state.sessions[0] || null; }
    function currentCustomer() { const session = currentSession(); return session ? state.customers.find((item) => item.id === session.customerId) || null : null; }

    function stageTagClass(stage) {
      const text = String(stage || "");
      if (text.includes("人工")) return "hot";
      if (text.includes("已") || text.includes("完成")) return "success";
      if (text.includes("待")) return "warn";
      return "blue";
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, { headers: { "Content-Type": "application/json", ...(options.headers || {}) }, cache: "no-store", ...options });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.status === 204 ? null : response.json();
    }

    async function loadState() {
      const data = await fetchJson("/api/workbench-state");
      state.platforms = Array.isArray(data.platforms) ? data.platforms : [];
      state.sessions = Array.isArray(data.sessions) ? data.sessions : [];
      state.logs = Array.isArray(data.logs) ? data.logs : [];
      state.customers = Array.isArray(data.customers) ? data.customers : [];
      state.knowledge = Array.isArray(data.knowledge) ? data.knowledge : [];
      state.integrations = data.integrations || {};
      if (!state.selectedSessionId || !state.sessions.some((item) => item.id === state.selectedSessionId)) {
        state.selectedSessionId = state.sessions[0]?.id || "";
      }
      render();
    }

    async function persistState() {
      try {
        await fetchJson("/api/workbench-state", { method: "PUT", body: JSON.stringify({ platforms: state.platforms, sessions: state.sessions, logs: state.logs, customers: state.customers, knowledge: state.knowledge, integrations: state.integrations }) });
      } catch {
        // keep the local interface responsive even if persistence blips
      }
    }

    function toast(message) {
      const node = $("#toast");
      node.textContent = message;
      node.classList.add("show");
      window.clearTimeout(node._timer);
      node._timer = window.setTimeout(() => node.classList.remove("show"), 2200);
    }

    function selectedKnowledgeMatches(query) {
      const text = String(query || "").toLowerCase();
      return state.knowledge.filter((item) => {
        const blob = `${item.title || ""} ${item.category || ""} ${item.source || ""} ${item.clean || ""}`.toLowerCase();
        return !text || blob.includes(text);
      }).slice(0, 3);
    }

    function buildAiReply(session, customer, knowledgeMatches) {
      const topic = customer?.focus || session?.summary || session?.title || "当前问题";
      const lead = `关于「${topic}」，我先给一个结论：`;
      const core = knowledgeMatches[0]
        ? `参考「${knowledgeMatches[0].title}」，可以优先用知识库里的说法回复，再补一个具体场景。`
        : "先把问题的核心结论说清，再补对应的使用场景和下一步动作。";
      const closing = customer?.stage && customer.stage.includes("人工")
        ? "当前会话已进入人工接手，建议保持简洁并确认后续跟进人。"
        : "如果需要，我可以继续整理成更适合直接发送的版本。";
      return [lead, core, closing].join("\n\n");
    }

    function buildSummary(session) {
      if (!session) return "";
      const customer = currentCustomer();
      const recent = (session.messages || []).slice(-5).map((msg) => `${msg.direction === "agent" ? "客服" : (msg.author || session.customerName || "客户")}：${msg.text}`).join("\n");
      return [`平台：${platformName(session.platformId)}`, `客户：${session.customerName || customer?.name || "未命名客户"}`, `会话：${session.title || "未命名会话"}`, `状态：${session.status || "待处理"}`, `摘要：${session.summary || customer?.focus || "待整理"}`, "", "最近消息：", recent || "暂无消息"].join("\n");
    }

    function persistMutation(session, patch, logText, logLevel = "info") {
      if (!session) return;
      Object.assign(session, patch, { updatedAt: nowText() });
      if (logText) state.logs.unshift({ id: `PL-${Date.now().toString().slice(-8)}`, platformId: session.platformId, level: logLevel, text: logText, at: nowText() });
      persistState();
      render();
    }

    function ensureCustomerForSession(session) {
      if (!session) return null;
      let customer = state.customers.find((item) => item.id === session.customerId) || null;
      if (!customer) {
        customer = { id: session.customerId || `C-${Date.now().toString().slice(-6)}`, name: session.customerName || "未命名客户", company: "未知", contact: "", industry: "未知", needType: session.title || "平台咨询", focus: session.summary || "待整理", stage: session.status || "新线索", risk: "低", source: platformName(session.platformId), createdAt: nowText(), updatedAt: nowText() };
        state.customers.unshift(customer);
        session.customerId = customer.id;
        session.customerName = customer.name;
      }
      return customer;
    }

    function addReplyToSession(text) {
      const session = currentSession();
      if (!session) return;
      session.messages = Array.isArray(session.messages) ? session.messages : [];
      session.messages.push({ id: `M-${Date.now().toString().slice(-8)}`, direction: "agent", text, author: "统一 Agent", at: nowText() });
      session.status = "已回复";
      session.unread = 0;
      session.lastMessageAt = nowText();
      session.summary = session.summary || text.slice(0, 42);
      state.drafts[session.id] = "";
      const customer = ensureCustomerForSession(session);
      if (customer) customer.stage = "已沟通";
      persistMutation(session, {}, null);
    }

    function renderPlatformTabs() {
      const tabs = $("#platformTabs");
      const platforms = [{ id: "all", name: "全部" }, ...(state.platforms || [])];
      tabs.innerHTML = platforms.map((platform) => `<button class="platform-tab ${state.selectedPlatform === platform.id ? "active" : ""}" data-platform="${escapeHtml(platform.id)}">${escapeHtml(platform.name)}</button>`).join("");
      tabs.querySelectorAll("[data-platform]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedPlatform = button.dataset.platform || "all";
          $("#activePlatformPill").textContent = state.selectedPlatform === "all" ? "全部平台" : platformName(state.selectedPlatform);
          renderSessionList();
        });
      });
    }

    function filteredSessions() {
      const text = state.search.trim().toLowerCase();
      return state.sessions.filter((session) => {
        const platformOk = state.selectedPlatform === "all" || session.platformId === state.selectedPlatform;
        const unreadOk = !state.unreadOnly || Number(session.unread || 0) > 0;
        const blob = `${session.title || ""} ${session.customerName || ""} ${session.summary || ""} ${platformName(session.platformId)}`.toLowerCase();
        const searchOk = !text || blob.includes(text);
        return platformOk && unreadOk && searchOk;
      });
    }

    function renderSessionList() {
      const list = $("#sessionList");
      const sessions = filteredSessions();
      if (!sessions.length) {
        list.innerHTML = `<div style="padding:18px 14px;color:var(--muted);font-size:13px;line-height:1.6;">当前筛选下没有会话。试试切换平台或清空搜索。</div>`;
        return;
      }
      list.innerHTML = sessions.map((session) => `
        <button class="session-item ${session.id === state.selectedSessionId ? "active" : ""}" data-session="${escapeHtml(session.id)}">
          <div class="avatar">${escapeHtml(initials(session.customerName || session.title))}</div>
          <div class="session-main">
            <div class="session-title"><span>${escapeHtml(session.customerName || session.title || "未命名会话")}</span>${Number(session.unread || 0) > 0 ? `<span class="session-unread">${Number(session.unread || 0)}</span>` : ""}</div>
            <div class="session-preview">${escapeHtml(session.summary || session.title || "暂无摘要")}</div>
          </div>
          <div class="session-meta"><span>${escapeHtml(platformName(session.platformId))}</span><span>${escapeHtml(session.lastMessageAt || "")}</span></div>
        </button>
      `).join("");
      list.querySelectorAll("[data-session]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedSessionId = button.dataset.session || "";
          const session = currentSession();
          if (session) session.unread = 0;
          render();
        });
      });
    }

    function renderChat() {
      const session = currentSession();
      const customer = currentCustomer();
      const body = $("#chatBody");
      if (!session) {
        body.innerHTML = `<div style="padding:20px;color:var(--muted);font-size:14px;">暂无会话。</div>`;
        return;
      }
      $("#chatTitle").textContent = session.customerName || session.title || "统一收件箱";
      $("#chatSub").textContent = `${platformName(session.platformId)} · ${session.status || "待处理"} · ${session.summary || "等待整理"}`;
      const messages = Array.isArray(session.messages) ? session.messages : [];
      body.innerHTML = messages.map((message, index) => `${index === 0 ? `<div class="time-divider">${escapeHtml(message.at || "")}</div>` : ""}
        <div class="bubble-row ${message.direction === "agent" ? "agent" : "customer"}">
          <div class="avatar" style="width:36px;height:36px;border-radius:11px;font-size:12px;">${escapeHtml(message.direction === "agent" ? "A" : initials(message.author || session.customerName))}</div>
          <div class="bubble">${escapeHtml(message.text)}<small>${escapeHtml((message.author || (message.direction === "agent" ? "统一 Agent" : session.customerName || "客户")) + " · " + (message.at || ""))}</small></div>
        </div>`).join("");
      body.scrollTop = body.scrollHeight;

      const customerSummary = $("#customerSummary");
      customerSummary.innerHTML = `
        <div class="summary"><span>客户</span><strong>${escapeHtml(customer?.name || session.customerName || "未命名客户")}</strong></div>
        <div class="summary"><span>来源</span><strong>${escapeHtml(platformName(session.platformId))}</strong></div>
        <div class="summary"><span>阶段</span><strong>${escapeHtml(customer?.stage || session.status || "新线索")}</strong></div>
        <div class="summary"><span>风险</span><strong>${escapeHtml(customer?.risk || "低")}</strong></div>
      `;
      $("#customerStageTag").textContent = customer?.stage || session.status || "新线索";
      $("#customerStageTag").className = `tag ${stageTagClass(customer?.stage || session.status)}`;

      const knowledgeMatches = selectedKnowledgeMatches(customer?.focus || session.summary || session.title || "");
      $("#routeTag").textContent = knowledgeMatches.length ? "知识优先" : "需要人工判断";
      $("#routeTag").className = `tag ${knowledgeMatches.length ? "success" : "warn"}`;
      $("#routeStack").innerHTML = [
        { label: "路由结果", value: knowledgeMatches.length ? "命中知识库，先给标准答复" : "未命中，先整理成人工接手" },
        { label: "会话状态", value: session.status || "待处理" },
        { label: "推荐动作", value: customer?.stage && customer.stage.includes("人工") ? "转人工跟进" : "AI 先草拟回复" }
      ].map((item) => `<div class="stack-item"><span>${escapeHtml(item.label)}</span><strong>${escapeHtml(item.value)}</strong></div>`).join("");

      $("#kbTags").innerHTML = knowledgeMatches.map((item) => `<span class="tag blue">${escapeHtml(item.title)}</span>`).join("") || `<span class="tag">暂无命中</span>`;
      $("#knowledgePreview").innerHTML = knowledgeMatches.slice(0, 3).map((item) => `<div class="stack-item"><span>${escapeHtml(item.category || "知识")}</span><strong>${escapeHtml(item.title || "未命名资料")}</strong></div>`).join("") || `<div class="stack-item"><span>知识候选</span><strong>没有找到可直接引用的条目。</strong></div>`;

      const logs = state.logs.filter((item) => !session.platformId || item.platformId === session.platformId).slice(0, 4);
      $("#logList").innerHTML = logs.map((item) => `<div class="log-item"><span>${escapeHtml(item.at || "")} · ${escapeHtml(item.level || "info")}</span><strong>${escapeHtml(item.text || "")}</strong></div>`).join("") || `<div class="log-item"><span>同步记录</span><strong>暂无日志</strong></div>`;

      const customerTags = [customer?.needType || session.title || "平台咨询", customer?.focus || session.summary || "待整理", customer?.source || platformName(session.platformId)].filter(Boolean);
      $("#composerTags").innerHTML = customerTags.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("");

      const draft = state.drafts[session.id] || "";
      $("#replyInput").value = draft || $("#replyInput").value || buildAiReply(session, customer, knowledgeMatches);
      $("#draftHint").textContent = draft ? "已保存草稿" : "可直接发送到当前会话";
      $("#bannerTitle").textContent = session.platformId === "douyin" ? "抖音会话已进入统一收件箱" : `会话 ${session.id} 已进入统一收件箱`;
      $("#bannerText").textContent = customer?.stage && customer.stage.includes("人工") ? "当前会话已标记为人工接手，右侧会优先显示客户信息与同步日志。" : "平台消息先进收件箱，再由同一套 Agent、知识库和人工接手处理。";
      $("#bannerState").textContent = session.status || "在线";
      $("#rightState").textContent = session.status || "实时";
      $("#syncStatusTag").textContent = state.logs[0]?.at ? `最近 ${state.logs[0].at}` : "最近同步";
    }

    function renderMetrics() {
      const unread = state.sessions.reduce((sum, session) => sum + Number(session.unread || 0), 0);
      const human = state.sessions.filter((session) => String(session.status || "").includes("人工")).length;
      $("#unreadBadge").textContent = String(unread);
      $("#metricUnread").textContent = String(unread);
      $("#metricHuman").textContent = String(human);
      $("#metricPlatforms").textContent = String(state.platforms.length);
    }

    function render() { renderMetrics(); renderPlatformTabs(); renderSessionList(); renderChat(); }

    function openCustomerModal() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      $("#modalTitle").textContent = "客户卡片";
      $("#modalBody").innerHTML = `
        <form id="customerForm">
          <div class="form-grid">
            <div class="field"><label>姓名</label><input name="name" value="${escapeHtml(customer?.name || "")}"></div>
            <div class="field"><label>联系方式</label><input name="contact" value="${escapeHtml(customer?.contact || "")}"></div>
            <div class="field"><label>公司</label><input name="company" value="${escapeHtml(customer?.company || "")}"></div>
            <div class="field"><label>行业</label><input name="industry" value="${escapeHtml(customer?.industry || "")}"></div>
            <div class="field"><label>需求类型</label><input name="needType" value="${escapeHtml(customer?.needType || session.title || "")}"></div>
            <div class="field"><label>阶段</label><input name="stage" value="${escapeHtml(customer?.stage || session.status || "新线索")}"></div>
            <div class="field full"><label>关注点</label><textarea name="focus">${escapeHtml(customer?.focus || session.summary || "")}</textarea></div>
            <div class="field full"><label>备注</label><textarea name="note">${escapeHtml(customer?.note || "")}</textarea></div>
          </div>
        </form>`;
      $("#modalActions").innerHTML = `<button class="btn" id="modalCancel" type="button">取消</button><button class="btn primary" id="modalSave" type="button">保存</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#modalCancel").addEventListener("click", closeModal);
      $("#modalSave").addEventListener("click", async () => {
        const form = $("#customerForm");
        const data = new FormData(form);
        Object.assign(customer, {
          name: String(data.get("name") || "").trim(),
          contact: String(data.get("contact") || "").trim(),
          company: String(data.get("company") || "").trim(),
          industry: String(data.get("industry") || "").trim(),
          needType: String(data.get("needType") || "").trim(),
          stage: String(data.get("stage") || "").trim(),
          focus: String(data.get("focus") || "").trim(),
          note: String(data.get("note") || "").trim(),
          updatedAt: nowText()
        });
        session.customerId = customer.id;
        session.customerName = customer.name || session.customerName;
        session.status = customer.stage || session.status;
        await persistState();
        closeModal();
        render();
        toast("客户卡已保存");
      });
    }

    function openSummaryModal() {
      const session = currentSession();
      if (!session) return;
      const text = buildSummary(session);
      $("#modalTitle").textContent = "会话摘要";
      $("#modalBody").innerHTML = `<div class="stack-item"><span>自动生成</span><strong style="white-space:pre-wrap;">${escapeHtml(text)}</strong></div>`;
      $("#modalActions").innerHTML = `<button class="btn" id="copySummaryNow" type="button">复制</button><button class="btn primary" id="saveSummaryNow" type="button">保存到会话</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#copySummaryNow").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(text); toast("摘要已复制"); } catch { $("#replyInput").value = text; toast("已填入回复框"); }
      });
      $("#saveSummaryNow").addEventListener("click", async () => {
        session.summary = text.split("\n").filter(Boolean).slice(0, 5).join(" ").slice(0, 140);
        await persistState();
        closeModal();
        render();
        toast("摘要已保存");
      });
    }

    function openKnowledgeModal() {
      const matches = selectedKnowledgeMatches(currentCustomer()?.focus || currentSession()?.summary || currentSession()?.title || "");
      $("#modalTitle").textContent = "知识候选";
      $("#modalBody").innerHTML = matches.map((item) => `<div class="stack-item"><span>${escapeHtml(item.category || "知识")}</span><strong>${escapeHtml(item.title || "未命名资料")}</strong></div>`).join("") || `<div class="stack-item"><span>知识候选</span><strong>暂无命中。</strong></div>`;
      $("#modalActions").innerHTML = `<button class="btn primary" id="modalOk" type="button">知道了</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#modalOk").addEventListener("click", closeModal);
    }

    function closeModal() { $("#modalLayer").classList.remove("show"); $("#modalLayer").setAttribute("aria-hidden", "true"); }
    function openAiAssist() {
      const session = currentSession();
      if (!session) return;
      const customer = currentCustomer();
      const knowledgeMatches = selectedKnowledgeMatches(customer?.focus || session.summary || session.title || "");
      const bodyText = buildAiReply(session, customer, knowledgeMatches);
      $("#replyInput").value = bodyText;
      state.drafts[session.id] = bodyText;
      render();
      toast("AI 已生成草稿");
    }

    function markHuman() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      session.status = "已转人工";
      session.unread = 0;
      if (customer) customer.stage = "已转人工";
      persistMutation(session, {}, `${session.title || session.id} 已转人工`, "warn");
      toast("已写入转人工状态");
    }

    function markDone() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      session.status = "已处理";
      session.unread = 0;
      if (customer) customer.stage = "已处理";
      persistMutation(session, {}, `${session.title || session.id} 已处理完成`, "success");
      toast("已标记完成");
    }

    function toggleRightPane() {
      state.rightVisible = !state.rightVisible;
      $("#rightPane").style.display = state.rightVisible ? "grid" : "none";
      toast(state.rightVisible ? "右侧面板已显示" : "右侧面板已隐藏");
    }

    function insertQuickText(text) {
      const input = $("#replyInput");
      input.value = input.value ? `${input.value}\n${text}` : text;
      input.focus();
      const session = currentSession();
      if (session) state.drafts[session.id] = input.value;
    }

    function installEvents() {
      $("#searchInput").addEventListener("input", (event) => { state.search = event.target.value; renderSessionList(); });
      $("#refreshState").addEventListener("click", async () => { await loadState(); toast("已刷新工作台"); });
      $("#toggleUnread").addEventListener("click", () => { state.unreadOnly = !state.unreadOnly; $("#toggleUnread").textContent = state.unreadOnly ? "查看全部" : "只看未读"; renderSessionList(); });
      $("#newSummary").addEventListener("click", openSummaryModal);
      $("#btnCustomer").addEventListener("click", openCustomerModal);
      $("#btnAi").addEventListener("click", openAiAssist);
      $("#btnHuman").addEventListener("click", markHuman);
      $("#btnDone").addEventListener("click", markDone);
      $("#openKnowledge").addEventListener("click", openKnowledgeModal);
      $("#navInbox").addEventListener("click", () => document.querySelector(".list-pane").scrollIntoView({ block: "start", behavior: "smooth" }));
      $("#navCustomers").addEventListener("click", () => $("#customerSummary")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navKnowledge").addEventListener("click", () => $("#knowledgePreview")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navSync").addEventListener("click", () => $("#logList")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navAdmin").addEventListener("click", () => { window.location.href = "/admin"; });
      $("#toggleRight").addEventListener("click", toggleRightPane);
      $("#replyInput").addEventListener("input", () => { const session = currentSession(); if (!session) return; state.drafts[session.id] = $("#replyInput").value; });
      $("#saveDraft").addEventListener("click", () => { const session = currentSession(); if (!session) return; state.drafts[session.id] = $("#replyInput").value; toast("草稿已保存"); });
      $("#sendReply").addEventListener("click", () => { const text = $("#replyInput").value.trim(); if (!text) return toast("先写一条回复"); addReplyToSession(text); $("#replyInput").value = ""; toast("已发送到当前会话"); });
      $("#copySummary").addEventListener("click", async () => { const session = currentSession(); if (!session) return; const text = buildSummary(session); try { await navigator.clipboard.writeText(text); toast("摘要已复制"); } catch { $("#replyInput").value = text; toast("已填入回复框"); } });
      $("#insertGreet").addEventListener("click", () => insertQuickText("亲，收到您的问题了，我先帮您整理一下。"));
      $("#insertLead").addEventListener("click", () => insertQuickText("如果方便，可以补充称呼、联系方式和希望交流的内容，我这边会继续跟进。"));
      $("#insertKb").addEventListener("click", () => insertQuickText("我先按知识库里的标准答复来整理，再补一个更贴合您场景的版本。"));
      $("#insertHuman").addEventListener("click", () => insertQuickText("这个问题我先转给人工继续跟进，避免来回沟通耽误您时间。"));
      $("#modalClose").addEventListener("click", closeModal);
      $("#modalLayer").addEventListener("click", (event) => { if (event.target === $("#modalLayer")) closeModal(); });
    }

    installEvents();
    loadState().catch(() => {
      state.platforms = [];
      state.sessions = [];
      render();
      toast("后端暂不可用，已显示空白工作台");
    });
  </script>
</body>
</html>
