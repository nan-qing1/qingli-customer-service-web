<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>清力统一多平台客服中台</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --line: #d8e1e8;
      --ink: #172033;
      --muted: #657286;
      --teal: #0a7b7d;
      --teal-deep: #075f63;
      --blue: #315f9f;
      --green: #2b8a69;
      --amber: #b8831e;
      --red: #bf4d4d;
      --shadow: 0 18px 48px rgba(23, 32, 51, 0.10);
      --shadow-strong: 0 24px 70px rgba(23, 32, 51, 0.14);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 32, 51, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(23, 32, 51, 0.03) 1px, transparent 1px),
        linear-gradient(145deg, #eef7f7 0%, #f8fbff 52%, #ffffff 100%);
      background-size: 42px 42px, 42px 42px, auto;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .app {
      width: min(1520px, calc(100vw - 28px));
      height: min(920px, calc(100vh - 28px));
      margin: 14px auto;
      display: grid;
      grid-template-columns: 88px 302px minmax(0, 1fr) 344px;
      border: 1px solid rgba(209, 220, 229, 0.95);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(18px);
    }

    .rail {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 14px 10px;
      background: #e9eef2;
      border-right: 1px solid var(--line);
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 24px rgba(10, 123, 125, 0.2);
      font-weight: 900;
      font-size: 18px;
      margin: 2px auto 0;
    }

    .rail-group { display: grid; gap: 10px; align-content: start; justify-items: center; }

    .rail-btn {
      position: relative;
      width: 60px;
      height: 42px;
      border: 1px solid transparent;
      border-radius: 13px;
      background: transparent;
      color: #4d5d72;
      font-size: 13px;
      font-weight: 850;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .rail-btn:hover, .rail-btn.active {
      background: #ffffff;
      color: var(--teal-deep);
      border-color: rgba(8, 122, 124, 0.12);
      transform: translateY(-1px);
    }

    .rail-dot {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 20px;
      height: 20px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }

    .list-pane {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--line);
      background: #f4f7f9;
    }

    .list-head {
      padding: 14px 14px 10px;
      display: grid;
      gap: 10px;
    }

    .list-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .list-title h1 { margin: 0; font-size: 18px; line-height: 1.2; letter-spacing: 0; }
    .list-title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px;
      gap: 8px;
      align-items: center;
    }

    .search {
      height: 40px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0 12px;
      outline: none;
      color: var(--ink);
      background: #fff;
      box-shadow: 0 8px 20px rgba(23, 32, 51, 0.04);
    }

    .search::placeholder { color: #8b96a4; }

    .small-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 0 14px 10px;
    }

    .metric {
      min-height: 64px;
      padding: 10px 11px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f8fbfd);
    }

    .metric span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .metric strong { display: block; margin-top: 7px; font-size: 19px; line-height: 1; }

    .platform-strip {
      padding: 0 14px 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .platform-strip::-webkit-scrollbar { display: none; }

    .platform-tab {
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid #dde7ee;
      background: #fff;
      color: #425168;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 800;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .platform-tab.active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 24px rgba(8, 122, 124, 0.16);
    }

    .session-list {
      min-height: 0;
      overflow: auto;
      padding: 0 8px 8px;
      display: grid;
      gap: 4px;
    }

    .session-item {
      width: 100%;
      min-height: 60px;
      border: 0;
      border-radius: 12px;
      padding: 8px 9px;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      background: transparent;
      color: inherit;
      transition: background 160ms ease, transform 160ms ease;
    }

    .session-item:hover, .session-item.active {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(23, 32, 51, 0.05);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, #5aa6a2, #6986c5);
    }

    .session-main { min-width: 0; }
    .session-title { display: flex; align-items: center; gap: 6px; min-width: 0; font-weight: 900; font-size: 13px; line-height: 1.2; }
    .session-title span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-preview {
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-meta {
      display: grid;
      justify-items: end;
      gap: 4px;
      color: #93a0b0;
      font-size: 11px;
    }

    .session-unread {
      min-width: 19px;
      height: 19px;
      padding: 0 5px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 11px;
      font-weight: 900;
    }

    .list-foot {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;
    }

    .btn.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      box-shadow: 0 12px 22px rgba(8, 122, 124, 0.14);
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      background: #f8fafb;
    }

    .chat-top {
      padding: 16px 18px 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .chat-title h2 { margin: 0; font-size: 21px; line-height: 1.15; letter-spacing: 0; }
    .chat-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .chat-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid #d8e8e6;
      background: #edf9f7;
      color: var(--teal-deep);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .banner {
      margin: 12px 14px 0;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid #cfe2ee;
      background: linear-gradient(135deg, #eefaf8, #f4f8ff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 10px 24px rgba(23, 32, 51, 0.04);
    }

    .banner strong { display: block; font-size: 14px; line-height: 1.3; }
    .banner small { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.4; }

    .chat-body {
      min-height: 0;
      padding: 14px 22px 12px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #fbfcfd;
    }

    .time-divider { align-self: center; color: #97a2b0; font-size: 12px; margin: 2px 0; }
    .bubble-row { display: flex; align-items: flex-start; gap: 10px; max-width: 76%; }
    .bubble-row.agent { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      min-width: 0;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid #e4e9ef;
      background: #fff;
      line-height: 1.65;
      white-space: pre-wrap;
      box-shadow: 0 4px 14px rgba(20, 36, 58, 0.05);
    }

    .bubble-row.agent .bubble { border-color: rgba(43, 138, 105, 0.18); background: linear-gradient(135deg, rgba(10, 123, 125, 0.12), rgba(49, 95, 159, 0.10)); }
    .bubble small { display: block; margin-top: 6px; color: #788595; font-size: 11px; }

    .composer {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 123, 125, 0.03), rgba(255,255,255,0) 24%), #fff;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 8px;
    }

    .composer-top, .composer-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .composer-tools { display: flex; gap: 8px; flex-wrap: wrap; }

    .tool-btn {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
    }

    .reply-shell {
      min-height: 0;
      border: 1px solid #dce7ee;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .reply-shell header {
      min-height: 44px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid #e5edf3;
      background: #fafdff;
      font-size: 13px;
      font-weight: 850;
    }

    .reply-shell textarea {
      width: 100%;
      height: 128px;
      min-height: 128px;
      max-height: 128px;
      padding: 14px 15px;
      border: 0;
      outline: none;
      resize: none;
      line-height: 1.7;
      color: var(--ink);
      background: transparent;
    }

    .reply-shell textarea::placeholder { color: #8c98a7; }

    .right-pane {
      min-width: 0;
      border-left: 1px solid var(--line);
      background: #fafbfc;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .right-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .right-head strong { display: block; font-size: 17px; }
    .right-head span { color: var(--muted); font-size: 12px; }

    .right-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(23, 32, 51, 0.04);
      overflow: hidden;
    }

    .panel h3 { margin: 0; font-size: 14px; line-height: 1.2; }
    .panel-head {
      min-height: 50px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
    }

    .panel-body { padding: 12px 14px 14px; }

    .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .summary {
      min-height: 72px;
      padding: 10px 11px;
      border-radius: 12px;
      border: 1px solid #dbe6ee;
      background: linear-gradient(180deg, #fff, #f7fafc);
    }

    .summary span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .summary strong { display: block; margin-top: 6px; font-size: 14px; line-height: 1.45; }

    .stack { display: grid; gap: 8px; }
    .stack-item {
      padding: 10px 11px;
      border: 1px solid #e2eaf0;
      border-radius: 12px;
      background: #f8fbfd;
    }

    .stack-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .stack-item strong { display: block; margin-top: 5px; font-size: 13px; line-height: 1.5; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid #d9e4ec;
      background: #fff;
      color: #34455d;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .tag.success { color: #176447; background: #e9f7f0; border-color: #cce8dc; }
    .tag.warn { color: #8a641f; background: #fff8e8; border-color: #efd9a9; }
    .tag.hot { color: #9a3b3b; background: #fff0ee; border-color: #f1cfca; }
    .tag.blue { color: #244f91; background: #edf4ff; border-color: #cfdff5; }

    .log-list { display: grid; gap: 8px; }
    .log-item {
      padding: 10px 11px;
      border: 1px solid #e2eaf0;
      border-radius: 12px;
      background: #fff;
    }

    .log-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; }
    .log-item strong { display: block; margin-top: 5px; font-size: 13px; line-height: 1.5; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: rgba(23, 32, 51, 0.88);
      opacity: 0;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
      font-size: 13px;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(23, 32, 51, 0.28);
      backdrop-filter: blur(8px);
    }
    .modal-layer.show { display: grid; }
    .modal-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(100vh - 48px));
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(215, 225, 233, 0.96);
      background: #fff;
      box-shadow: 0 24px 70px rgba(23, 32, 51, 0.22);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      min-height: 62px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3 { margin: 0; font-size: 18px; }
    .modal-close {
      width: 34px;
      height: 34px;
      border: 1px solid #e2e9ef;
      border-radius: 10px;
      background: #f4f7f9;
      color: #536176;
      font-weight: 900;
    }

    .modal-body { padding: 16px 18px 18px; display: grid; gap: 10px; }
    .modal-actions { padding: 0 18px 18px; display: flex; justify-content: flex-end; gap: 8px; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .field { display: grid; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    .field label { color: #405065; font-size: 13px; font-weight: 800; }
    .field input, .field textarea, .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fbfdff;
      outline: none;
    }
    .field textarea { min-height: 72px; resize: vertical; }
    .field input:focus, .field textarea:focus, .field select:focus,
    .search:focus, .reply-shell textarea:focus {
      border-color: rgba(8, 122, 124, 0.55);
      box-shadow: 0 0 0 3px rgba(8, 122, 124, 0.10);
      background: #fff;
    }

    @media (max-width: 1280px) {
      body { overflow: auto; }
      .app {
        width: 100%;
        height: auto;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        grid-template-columns: 76px 280px minmax(0, 1fr);
      }
      .right-pane { grid-column: 2 / 4; border-left: 0; border-top: 1px solid var(--line); min-height: 360px; }
    }

    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .rail, .right-pane { display: none; }
      .list-pane { min-height: 320px; }
      .workspace { min-height: 620px; }
      .bubble-row { max-width: 92%; }
    }
    /* WeChat-inspired polish layer */
    :root {
      --ink: #1f2329;
      --muted: #86909c;
      --line: #e5e6eb;
      --teal: #07c160;
      --teal-deep: #06ae56;
      --blue: #1683ff;
      --red: #fa5151;
      --shadow: 0 8px 24px rgba(31, 35, 41, 0.06);
      --shadow-strong: 0 12px 32px rgba(31, 35, 41, 0.08);
    }

    body {
      background: #f5f6f7;
      color: var(--ink);
    }

    .app {
      border-color: #e5e6eb;
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--shadow-strong);
    }

    .rail,
    .list-pane,
    .workspace,
    .right-pane {
      background: #f7f8fa;
    }

    .brand-mark,
    .btn.primary,
    .platform-tab.active {
      background: #07c160;
      box-shadow: none;
    }

    .rail-btn:hover,
    .rail-btn.active,
    .session-item:hover,
    .session-item.active {
      background: #ffffff;
      box-shadow: none;
      transform: none;
    }

    .search,
    .metric,
    .session-item.active,
    .banner,
    .panel,
    .summary,
    .stack-item,
    .log-item,
    .reply-shell,
    .tool-btn,
    .btn,
    .small-icon,
    .platform-tab {
      border-color: #e5e6eb;
      border-radius: 12px;
      box-shadow: none;
      background: #fff;
    }

    .banner {
      background: #f0fff7;
      border-color: #c9f2dc;
    }

    .pill,
    .tag.success {
      color: #078842;
      background: #e8f8ef;
      border-color: #c9f2dc;
    }

    .bubble {
      border-color: #e5e6eb;
      border-radius: 10px;
      box-shadow: none;
    }

    .bubble-row.agent .bubble {
      background: #95ec69;
      border-color: #95ec69;
    }

    .avatar {
      background: #5f9fdb;
      box-shadow: none;
    }

    .chat-top,
    .right-head,
    .panel-head,
    .list-foot,
    .reply-shell header,
    .composer {
      background: #fff;
    }

    .btn:hover,
    .tool-btn:hover,
    .small-icon:hover {
      background: #f5f6f7;
    }

    /* WeChat-inspired visual overrides */
    :root {
      --wx-bg: #f5f6f7;
      --wx-surface: #ffffff;
      --wx-surface-soft: #f7f8fa;
      --wx-line: #e5e6eb;
      --wx-ink: #1f2329;

  <script>
    const state = {
      platforms: [], sessions: [], logs: [], customers: [], knowledge: [], integrations: {}, aiStatus: {},
      selectedPlatform: "all", selectedSessionId: "", search: "", unreadOnly: false,
      drafts: {}, draftMeta: {}, aiThreads: {}, aiTemplates: {}, aiInputs: {}, rightVisible: false
    };
    const customerSyncChannel = "BroadcastChannel" in window
      ? new BroadcastChannel("qingli.customer.database.sync.v1")
      : null;
    let stateReloadTimer = 0;

    const AI_COLLAB_HEIGHT_KEY = "qingli-workbench-ai-collab-height";
    const AI_COLLAB_DEFAULT_HEIGHT = 320;
    const AI_COLLAB_MIN_HEIGHT = 280;
    const AI_COLLAB_MAX_HEIGHT = 560;

    const $ = (selector, root = document) => root.querySelector(selector);
    const escapeHtml = (value) => String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;");

    function nowText() { return new Date().toLocaleString("zh-CN", { hour12: false }); }
    function initials(name) { const clean = String(name || "").trim(); return clean ? clean.slice(0, 2) : "未"; }
    function platformName(id) { return state.platforms.find((entry) => entry.id === id)?.name || id || "未命名平台"; }
    function currentSession() { return state.sessions.find((item) => item.id === state.selectedSessionId) || state.sessions[0] || null; }
    function currentCustomer() { const session = currentSession(); return session ? state.customers.find((item) => item.id === session.customerId) || null : null; }
    function clampNumber(value, min, max) { return Math.min(max, Math.max(min, value)); }

    function readAiCollabHeight() {
      try {
        const saved = Number(window.localStorage.getItem(AI_COLLAB_HEIGHT_KEY));
        return Number.isFinite(saved) && saved > 0 ? saved : AI_COLLAB_DEFAULT_HEIGHT;
      } catch {
        return AI_COLLAB_DEFAULT_HEIGHT;
      }
    }

    function applyAiCollabHeight(value, persist = false) {
      const next = Math.round(clampNumber(Number(value) || AI_COLLAB_DEFAULT_HEIGHT, AI_COLLAB_MIN_HEIGHT, AI_COLLAB_MAX_HEIGHT));
      document.documentElement.style.setProperty("--wx-ai-collab-height", `${next}px`);
      if (persist) {
        try { window.localStorage.setItem(AI_COLLAB_HEIGHT_KEY, String(next)); } catch { /* ignore storage failures */ }
      }
      return next;
    }

    function stageTagClass(stage) {
      const text = String(stage || "");
      if (text.includes("人工")) return "hot";
      if (text.includes("已") || text.includes("完成")) return "success";
      if (text.includes("待")) return "warn";
      return "blue";
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, { headers: { "Content-Type": "application/json", ...(options.headers || {}) }, cache: "no-store", ...options });
      if (response.status === 204) return null;
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data?.message || `${response.status} ${response.statusText}`);
      return data;
    }

    async function requestAgentAi(mode, message, session, customer, knowledgeMatches = []) {
      const question = latestCustomerMessage(session);
      const conversation = (session?.messages || [])
        .filter((item) => !/^(客户主动请求转人工|请求转人工|已转人工)$/.test(String(item.text || "").trim()))
        .slice(-8)
        .map((item) => `${item.direction === "agent" ? "客服" : (item.author || "客户")}：${item.text || ""}`)
        .join("\n");
      const context = [
        `平台：${platformName(session?.platformId)}`,
        `客户：${customer?.name || session?.customerName || "未命名客户"}`,
        `会话主题：${session?.title || "未命名会话"}`,
        `会话摘要：${session?.summary || customer?.focus || "待整理"}`,
        `相关知识：${knowledgeMatches.map((item) => item.title).filter(Boolean).join("、") || "由后端自动检索"}`,
        conversation ? `最近对话：\n${conversation}` : ""
      ].filter(Boolean).join("\n");
      const result = await fetchJson("/api/ai/chat", {
        method: "POST",
        body: JSON.stringify({
          mode,
          message: `客户原始问题：${question}\n当前任务：${message}\n请先对原问题给出具体、有知识依据的内容，再处理当前任务。`,
          context
        })
      });
      const answer = String(result?.answer || "").trim();
      if (answer.length < 120 && /请(直接)?告诉我|请说明|请补充|您想咨询|哪方面信息|无法准确理解|重新发送/.test(answer)) {
        throw new Error("AI returned an unhelpful clarification");
      }
      return {
        text: answer,
        provider: `API · ${String(result?.model || "AI")}${Number(result?.attempts || 1) > 1 ? " · 重试成功" : ""}`,
        durationMs: Number(result?.durationMs || 0),
        sourceCount: Array.isArray(result?.sources) ? result.sources.length : 0
      };
    }

    async function loadState() {
      const [data, aiStatus] = await Promise.all([
        fetchJson("/api/workbench-state"),
        fetchJson("/api/ai/status").catch(() => ({ configured: false }))
      ]);
      state.platforms = Array.isArray(data.platforms) ? data.platforms : [];
      state.sessions = Array.isArray(data.sessions) ? data.sessions : [];
      state.logs = Array.isArray(data.logs) ? data.logs : [];
      state.customers = Array.isArray(data.customers) ? data.customers : [];
      state.knowledge = Array.isArray(data.knowledge) ? data.knowledge : [];
      state.integrations = data.integrations || {};
      state.aiStatus = aiStatus || {};
      if (!state.selectedSessionId || !state.sessions.some((item) => item.id === state.selectedSessionId)) {
        state.selectedSessionId = state.sessions[0]?.id || "";
      }
      render();
    }

    function scheduleStateReload(delay = 250) {
      window.clearTimeout(stateReloadTimer);
      stateReloadTimer = window.setTimeout(() => {
        loadState().catch(() => {});
      }, delay);
    }

    async function persistState() {
      try {
        await fetchJson("/api/workbench-state", { method: "PUT", body: JSON.stringify({ platforms: state.platforms, sessions: state.sessions, logs: state.logs, customers: state.customers, knowledge: state.knowledge, integrations: state.integrations }) });
      } catch {
        // keep the local interface responsive even if persistence blips
      }
    }

    function toast(message) {
      const node = $("#toast");
      node.textContent = message;
      node.classList.add("show");
      window.clearTimeout(node._timer);
      node._timer = window.setTimeout(() => node.classList.remove("show"), 2200);
    }

    function selectedKnowledgeMatches(query) {
      const compact = String(query || "").toLowerCase().replace(/[\s\p{P}\p{S}]+/gu, "");
      const terms = new Set();
      for (let index = 0; index < compact.length - 1; index += 1) terms.add(compact.slice(index, index + 2));
      const ranked = state.knowledge.map((item) => {
        const blob = `${item.title || ""} ${item.category || ""} ${item.source || ""} ${item.clean || ""}`.toLowerCase();
        const score = [...terms].reduce((sum, term) => sum + (blob.includes(term) ? 1 : 0), 0);
        return { item, score };
      }).sort((left, right) => right.score - left.score);
      const matched = ranked.filter((entry) => entry.score > 0);
      return (matched.length ? matched : ranked).slice(0, 3).map((entry) => entry.item);
    }

    function compactText(value, limit = 120) {
      return String(value || "").replace(/\s+/g, " ").trim().slice(0, limit);
    }

    function latestCustomerMessage(session) {
      const messages = Array.isArray(session?.messages) ? session.messages : [];
      const latest = [...messages].reverse().find((message) => message.direction !== "agent"
        && !/^(客户主动请求转人工|请求转人工|已转人工)$/.test(String(message.text || "").trim()));
      return compactText(latest?.text || session?.summary || session?.title || "当前问题", 80);
    }

    function assistantTime() {
      return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
    }

    function ensureAiThread(session) {
      if (!session) return [];
      if (!Array.isArray(state.aiThreads[session.id])) {
        state.aiThreads[session.id] = [{
          id: `AI-${Date.now()}`,
          role: "ai",
          text: `已识别客户问题：“${latestCustomerMessage(session)}”。生成内容时会优先直接回答，再补充必要的核验边界和下一步。`,
          provider: "会话分析",
          at: assistantTime()
        }];
      }
      return state.aiThreads[session.id];
    }

    function appendAiMessage(session, role, text, kind = "", provider = "") {
      if (!session || !String(text || "").trim()) return;
      ensureAiThread(session).push({
        id: `AI-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`,
        role,
        text: String(text).trim(),
        kind,
        provider,
        at: assistantTime()
      });
    }

    function buildReplyTemplate(session, customer, knowledgeMatches, instruction = "") {
      return buildCustomerReadyReply(session, customer, knowledgeMatches, instruction);
    }

    function buildCustomerReadyReply(session, customer, knowledgeMatches, instruction = "") {
      const question = latestCustomerMessage(session);
      const topic = compactText(customer?.focus || session?.summary || session?.title || question, 60);
      const customerName = compactText(customer?.name || session?.customerName || "", 16);
      const greeting = customerName && !/未命名|访客/.test(customerName) ? `${customerName}，您好。` : "您好。";
      const knowledge = knowledgeMatches[0];
      const isTechnical = /寿命|发热|成本|参数|型号|适配|技术|电机|MEMS|射频/i.test(`${question} ${topic}`);
      const isCooperation = /合作|量产|报价|资料|方案/i.test(`${question} ${topic}`);
      const isOtherApplications = /其他应用|还有哪些应用|还能用于|应用.{0,8}哪些/i.test(`${question} ${topic}`);
      const isHuman = String(customer?.stage || session?.status || "").includes("人工");

      if (isOtherApplications) {
        const detail = [
          greeting,
          "除空心杯电机外，清力技术公开资料中较明确的自超滑应用还包括：",
          "1. MEMS 射频开关：面向 5G/5.5G/6G 基站、移动终端、相控阵雷达、半导体测试和医疗设备等场景。",
          "2. 微动发电机：利用环境中的低频振动、晃动等机械能发电，可用于智慧电网、物流、铁路、工厂和物联网传感器。",
          "3. 机器人与精密运动部件：可用于灵巧手、关节执行器及其他对低摩擦、低磨损、低发热和长寿命要求较高的部件。",
          "目前公开信息主要体现为样机、验证和产业化推进，具体产品适配与量产情况仍需结合项目工况由技术人员确认。",
          "您更关注射频开关、微动发电，还是机器人相关应用？我可以继续按方向整理。"
        ];
        return /简短|精简|一句|三句/.test(instruction)
          ? `${greeting}除空心杯电机外，自超滑技术还可用于 MEMS 射频开关、微动发电机，以及机器人和精密运动部件。目前公开资料以样机和验证阶段为主，具体适配需结合项目工况确认。`
          : detail.join("\n\n");
      }

      let explanation = knowledge
        ? `关于您咨询的“${topic}”，我们会结合《${knowledge.title}》中的资料为您确认。`
        : `关于您咨询的“${topic}”，我们已经记录。`;
      let followUp = "为了给您更准确的答复，麻烦补充一下具体使用场景和最关注的问题。";

      if (isTechnical) {
        explanation += "具体寿命、发热、维护成本或适配结果会受到型号、负载、工作时长和使用环境影响。";
        followUp = "麻烦补充一下应用场景、目标型号，以及尺寸、电压、负载等关键要求；收到后我们会结合工况给出更准确的建议。";
      } else if (isCooperation) {
        followUp = "麻烦补充一下计划应用的产品、当前阶段、预期数量和希望获取的资料范围，我们会安排对应同事继续对接。";
      }

      if (isHuman) {
        followUp += "这部分已转交人工同事确认，确认后会尽快回复您。";
      } else {
        followUp += "收到信息后，我们会尽快整理明确回复给您。";
      }

      const lines = [greeting, explanation, followUp];
      if (/简短|精简|一句|三句/.test(instruction)) return lines.join("");
      return lines.join("\n\n");
    }

    function buildAiConsultReply(prompt, session, customer, knowledgeMatches) {
      const instruction = compactText(prompt, 160);
      const topic = compactText(customer?.focus || session?.summary || session?.title || latestCustomerMessage(session), 60);
      if (/模板|框架|结构/.test(instruction)) {
        return `可以。模板会按“确认问题 → 核心答复 → 补充信息 → 下一步”组织，并围绕“${topic}”避免无依据承诺。点击“生成回复模板”即可生成完整版本。`;
      }
      if (/简短|精简|太长/.test(instruction)) {
        return "可以。我会把客户回复压缩为三段：先确认问题，再给明确说明，最后只保留一个下一步动作。";
      }
      if (/专业|正式|商务/.test(instruction)) {
        return "明白。我会用更专业、克制的表达，去掉口语化称呼和不确定承诺，同时保留必要的参数确认项。";
      }
      if (/亲切|口语|自然|微信/.test(instruction)) {
        return "明白。我会把语气调整得自然、友好，句子更短，但不会使用过度热情或影响专业度的表达。";
      }
      if (/补充|询问|信息|还要问/.test(instruction)) {
        return `针对“${topic}”，建议只追问影响判断的关键信息，例如应用场景、型号、关键参数和预期时间，避免一次让客户填写太多内容。`;
      }
      const basis = knowledgeMatches[0]
        ? `当前可优先参考《${knowledgeMatches[0].title}》`
        : "当前没有明确的知识条目可直接引用";
      return `收到。${basis}。我建议先回应“${topic}”的核心关切，再确认缺少的信息，最后给出明确的跟进动作。你可以继续补充语气要求，或直接生成回复模板。`;
    }

    function updateReplyCharCount() {
      const input = $("#replyInput");
      const counter = $("#replyCharCount");
      if (input && counter) counter.textContent = `${input.value.length} 字`;
    }

    function renderComposerActions(session) {
      const node = $("#composerTags");
      if (!node) return;
      if (!session) {
        node.innerHTML = "";
        return;
      }
      const actions = [
        { key: "analyze", label: "分析客户问题" },
        { key: "missing", label: "提炼待确认信息" },
        { key: "template", label: "生成回复模板" },
        { key: "draft", label: "整理成可发送" }
      ];
      node.innerHTML = actions.map((action) => `
        <button class="ai-quick-action" type="button" data-ai-action="${action.key}" title="点击后带入当前会话并执行">${action.label}</button>
      `).join("");
    }

    function runComposerQuickAction(action) {
      const session = currentSession();
      if (!session) return toast("请先选择一个会话");
      if (action === "template") return generateReplyTemplate();
      if (action === "draft") return polishCustomerReply();

      const customer = currentCustomer();
      const topic = compactText(customer?.focus || session.summary || session.title || latestCustomerMessage(session), 64);
      const prompt = action === "missing"
        ? `请围绕“${topic}”提炼还需要向客户确认的关键信息，最多列出 3 项，并说明每项的用途。`
        : `请先分析客户关于“${topic}”的问题，提炼核心诉求、已知信息和回复时需要注意的重点。`;
      const input = $("#aiChatInput");
      input.value = prompt;
      state.aiInputs[session.id] = prompt;
      sendAiChatMessage();
    }

    function renderAssistantWorkspace(session, customer, knowledgeMatches = []) {
      const chat = $("#aiChatMessages");
      const aiInput = $("#aiChatInput");
      const replyInput = $("#replyInput");
      const controls = [$("#sendAiMessage"), $("#generateTemplate"), $("#polishReply"), $("#clearReply"), $("#sendReply")];
      controls.forEach((control) => { if (control) control.disabled = !session; });

      if (!session) {
        if (chat) chat.innerHTML = `<div class="ai-chat-message"><span class="ai-chat-author">方案 AI</span><div class="ai-chat-bubble">选择一个会话后即可开始讨论。</div></div>`;
        if (aiInput) aiInput.value = "";
        if (replyInput) replyInput.value = "";
        renderComposerActions(null);
        $("#aiContextHint").textContent = "选择一个会话后开始";
        $("#draftHint").textContent = "待整理";
        updateReplyCharCount();
        return;
      }

      renderComposerActions(session);
      const apiLabel = state.aiStatus?.configured
        ? `API 已连接 · ${state.aiStatus.model || "AI"}`
        : "API 未连接";
      $("#aiContextHint").textContent = `已带入：${compactText(customer?.focus || session.summary || session.title || "当前会话", 28)} · ${apiLabel}`;
      const thread = ensureAiThread(session);
      const contextCard = `
        <article class="ai-knowledge-media">
          <img src="assets/frictionx-application.jpg" alt="清力技术行业应用">
          <div class="ai-knowledge-copy">
            <span><iconify-icon icon="solar:book-2-linear" aria-hidden="true"></iconify-icon>已审核知识</span>
            <strong>自超滑技术应用资料</strong>
            <p>回答将结合当前会话和知识库内容生成。</p>
          </div>
          <a href="https://www.frictionx.com/" target="_blank" rel="noreferrer">查看来源</a>
        </article>`;
      chat.innerHTML = contextCard + thread.map((message) => `
        <div class="ai-chat-message ${message.role === "human" ? "human" : "ai"} ${message.kind === "template" ? "template" : ""}">
          <span class="ai-chat-author">${message.role === "human" ? "我" : "方案 AI"}${message.provider ? ` · ${escapeHtml(message.provider)}` : ""} · ${escapeHtml(message.at || "")}</span>
          <div class="ai-chat-bubble">${escapeHtml(message.text)}</div>
        </div>
      `).join("");
      aiInput.value = state.aiInputs[session.id] || "";
      replyInput.value = state.drafts[session.id] || "";
      $("#generateTemplate").textContent = state.aiTemplates[session.id] ? "重新生成模板" : "生成回复模板";
      $("#polishReply").textContent = state.drafts[session.id] ? "重新整理" : "整理客户回复";
      $("#draftHint").textContent = state.drafts[session.id] ? (state.draftMeta[session.id] || "人工已编辑") : "待整理";
      updateReplyCharCount();
      requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
    }

    function buildSummary(session) {
      if (!session) return "";
      const customer = currentCustomer();
      const recent = (session.messages || []).slice(-5).map((msg) => `${msg.direction === "agent" ? "客服" : (msg.author || session.customerName || "客户")}：${msg.text}`).join("\n");
      return [`平台：${platformName(session.platformId)}`, `客户：${session.customerName || customer?.name || "未命名客户"}`, `会话：${session.title || "未命名会话"}`, `状态：${session.status || "待处理"}`, `摘要：${session.summary || customer?.focus || "待整理"}`, "", "最近消息：", recent || "暂无消息"].join("\n");
    }

    function persistMutation(session, patch, logText, logLevel = "info") {
      if (!session) return;
      Object.assign(session, patch, { updatedAt: nowText() });
      if (logText) state.logs.unshift({ id: `PL-${Date.now().toString().slice(-8)}`, platformId: session.platformId, level: logLevel, text: logText, at: nowText() });
      persistState();
      render();
    }

    function ensureCustomerForSession(session) {
      if (!session) return null;
      let customer = state.customers.find((item) => item.id === session.customerId) || null;
      if (!customer) {
        customer = { id: session.customerId || `C-${Date.now().toString().slice(-6)}`, name: session.customerName || "未命名客户", company: "未知", contact: "", industry: "未知", needType: session.title || "平台咨询", focus: session.summary || "待整理", stage: session.status || "新线索", risk: "低", source: platformName(session.platformId), createdAt: nowText(), updatedAt: nowText() };
        state.customers.unshift(customer);
        session.customerId = customer.id;
        session.customerName = customer.name;
      }
      return customer;
    }

    async function addReplyToSession(text) {
      const session = currentSession();
      if (!session) return;
      if (session.platformId === "wechat_official") {
        const result = await fetchJson("/api/wechat/send", {
          method: "POST",
          body: JSON.stringify({ sessionId: session.id, text })
        });
        const index = state.sessions.findIndex((item) => item.id === session.id);
        if (index >= 0 && result?.session) state.sessions[index] = result.session;
        state.drafts[session.id] = "";
        delete state.draftMeta[session.id];
        render();
        return;
      }
      session.messages = Array.isArray(session.messages) ? session.messages : [];
      session.messages.push({ id: `M-${Date.now().toString().slice(-8)}`, direction: "agent", text, author: "人工客服", at: nowText() });
      session.status = "已回复";
      session.unread = 0;
      session.lastMessageAt = nowText();
      session.summary = session.summary || text.slice(0, 42);
      state.drafts[session.id] = "";
      delete state.draftMeta[session.id];
      const customer = ensureCustomerForSession(session);
      if (customer) customer.stage = "已沟通";
      persistMutation(session, {}, null);
    }

    function renderPlatformTabs() {
      const tabs = $("#platformTabs");
      const platforms = [{ id: "all", name: "全部" }, ...(state.platforms || [])];
      tabs.innerHTML = platforms.map((platform) => `<button class="platform-tab ${state.selectedPlatform === platform.id ? "active" : ""}" data-platform="${escapeHtml(platform.id)}">${escapeHtml(platform.name)}</button>`).join("");
      tabs.querySelectorAll("[data-platform]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedPlatform = button.dataset.platform || "all";
          $("#activePlatformPill").textContent = state.selectedPlatform === "all" ? "全部平台" : platformName(state.selectedPlatform);
          renderSessionList();
        });
      });
    }

    function filteredSessions() {
      const text = state.search.trim().toLowerCase();
      return state.sessions.filter((session) => {
        const platformOk = state.selectedPlatform === "all" || session.platformId === state.selectedPlatform;
        const unreadOk = !state.unreadOnly || Number(session.unread || 0) > 0;
        const blob = `${session.title || ""} ${session.customerName || ""} ${session.summary || ""} ${platformName(session.platformId)}`.toLowerCase();
        const searchOk = !text || blob.includes(text);
        return platformOk && unreadOk && searchOk;
      });
    }

    function renderSessionList() {
      const list = $("#sessionList");
      const sessions = filteredSessions();
      if (!sessions.length) {
        list.innerHTML = `<div style="padding:18px 14px;color:var(--muted);font-size:13px;line-height:1.6;">当前筛选下没有会话。试试切换平台或清空搜索。</div>`;
        return;
      }
      list.innerHTML = sessions.map((session) => `
        <button class="session-item ${session.id === state.selectedSessionId ? "active" : ""}" data-session="${escapeHtml(session.id)}">
          <div class="avatar"><span class="avatar-fallback">${escapeHtml(initials(session.customerName || session.title))}</span><img src="https://picsum.photos/seed/${encodeURIComponent(session.id)}/80/80" alt="" loading="lazy" onerror="this.src='assets/avatar-placeholder.jpg';this.onerror=null"></div>
          <div class="session-main">
            <div class="session-title"><span>${escapeHtml(session.customerName || session.title || "未命名会话")}</span>${Number(session.unread || 0) > 0 ? `<span class="session-unread">${Number(session.unread || 0)}</span>` : ""}</div>
            <div class="session-preview">${escapeHtml(session.summary || session.title || "暂无摘要")}</div>
          </div>
          <div class="session-meta"><span>${escapeHtml(platformName(session.platformId))}</span><span>${escapeHtml(session.lastMessageAt || "")}</span></div>
        </button>
      `).join("");
      list.querySelectorAll("[data-session]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedSessionId = button.dataset.session || "";
          const session = currentSession();
          if (session) session.unread = 0;
          render();
        });
      });
    }

    function renderChat() {
      const session = currentSession();
      const customer = currentCustomer();
      const body = $("#chatBody");
      if (!session) {
        body.innerHTML = `<div style="padding:20px;color:var(--muted);font-size:14px;">暂无会话。</div>`;
        renderAssistantWorkspace(null, null, []);
        return;
      }
      $("#chatTitle").textContent = session.customerName || session.title || "统一收件箱";
      $("#chatSub").textContent = `${platformName(session.platformId)} · ${session.status || "待处理"} · ${session.summary || "等待整理"}`;
      const messages = Array.isArray(session.messages) ? session.messages : [];
      body.innerHTML = messages.map((message, index) => `${index === 0 ? `<div class="time-divider">${escapeHtml(message.at || "")}</div>` : ""}
        <div class="bubble-row ${message.direction === "agent" ? "agent" : "customer"}">
          <div class="avatar" style="width:36px;height:36px;border-radius:11px;font-size:12px;"><span class="avatar-fallback">${escapeHtml(message.direction === "agent" ? "A" : initials(message.author || session.customerName))}</span>${message.direction === "agent" ? "" : `<img src="https://picsum.photos/seed/${encodeURIComponent(session.id)}/80/80" alt="" loading="lazy" onerror="this.src='assets/avatar-placeholder.jpg';this.onerror=null">`}</div>
          <div class="bubble">${escapeHtml(message.text)}<small>${escapeHtml((message.author || (message.direction === "agent" ? "统一 Agent" : session.customerName || "客户")) + " · " + (message.at || ""))}</small></div>
        </div>`).join("");
      body.scrollTop = body.scrollHeight;

      const customerSummary = $("#customerSummary");
      customerSummary.innerHTML = `
        <div class="summary"><span>客户</span><strong>${escapeHtml(customer?.name || session.customerName || "未命名客户")}</strong></div>
        <div class="summary"><span>来源</span><strong>${escapeHtml(`${platformName(session.platformId)} · ${Number(customer?.visitCount || customer?.sessionIds?.length || 1)} 次访问`)}</strong></div>
        <div class="summary"><span>阶段</span><strong>${escapeHtml(customer?.stage || session.status || "新线索")}</strong></div>
        <div class="summary"><span>风险</span><strong>${escapeHtml(customer?.risk || "低")}</strong></div>
      `;
      $("#customerStageTag").textContent = customer?.stage || session.status || "新线索";
      $("#customerStageTag").className = `tag ${stageTagClass(customer?.stage || session.status)}`;

      const knowledgeMatches = selectedKnowledgeMatches(`${customer?.focus || ""} ${session.summary || ""} ${session.title || ""}`);
      $("#routeTag").textContent = knowledgeMatches.length ? "知识优先" : "需要人工判断";
      $("#routeTag").className = `tag ${knowledgeMatches.length ? "success" : "warn"}`;
      $("#routeStack").innerHTML = [
        { label: "路由结果", value: knowledgeMatches.length ? "命中知识库，先给标准答复" : "未命中，先整理成人工接手" },
        { label: "会话状态", value: session.status || "待处理" },
        { label: "推荐动作", value: customer?.stage && customer.stage.includes("人工") ? "转人工跟进" : "AI 先草拟回复" }
      ].map((item) => `<div class="stack-item"><span>${escapeHtml(item.label)}</span><strong>${escapeHtml(item.value)}</strong></div>`).join("");

      $("#kbTags").innerHTML = knowledgeMatches.map((item) => `<span class="tag blue">${escapeHtml(item.title)}</span>`).join("") || `<span class="tag">暂无命中</span>`;
      $("#knowledgePreview").innerHTML = knowledgeMatches.slice(0, 3).map((item) => `<div class="stack-item"><span>${escapeHtml(item.category || "知识")}</span><strong>${escapeHtml(item.title || "未命名资料")}</strong></div>`).join("") || `<div class="stack-item"><span>知识候选</span><strong>没有找到可直接引用的条目。</strong></div>`;

      const logs = state.logs.filter((item) => !session.platformId || item.platformId === session.platformId).slice(0, 4);
      $("#logList").innerHTML = logs.map((item) => `<div class="log-item"><span>${escapeHtml(item.at || "")} · ${escapeHtml(item.level || "info")}</span><strong>${escapeHtml(item.text || "")}</strong></div>`).join("") || `<div class="log-item"><span>同步记录</span><strong>暂无日志</strong></div>`;

      renderAssistantWorkspace(session, customer, knowledgeMatches);
      $("#bannerTitle").textContent = session.platformId === "douyin" ? "抖音会话已进入统一收件箱" : `会话 ${session.id} 已进入统一收件箱`;
      $("#bannerText").textContent = customer?.stage && customer.stage.includes("人工") ? "当前会话已标记为人工接手，右侧会优先显示客户信息与同步日志。" : "平台消息先进收件箱，再由同一套 Agent、知识库和人工接手处理。";
      $("#bannerState").textContent = session.status || "在线";
      $("#rightState").textContent = session.status || "实时";
      $("#syncStatusTag").textContent = state.logs[0]?.at ? `最近 ${state.logs[0].at}` : "最近同步";
    }

    function renderMetrics() {
      const unread = state.sessions.reduce((sum, session) => sum + Number(session.unread || 0), 0);
      const human = state.sessions.filter((session) => String(session.status || "").includes("人工")).length;
      $("#unreadBadge").textContent = String(unread);
      $("#metricUnread").textContent = String(unread);
      $("#metricHuman").textContent = String(human);
      $("#metricPlatforms").textContent = String(state.platforms.length);
    }

    function render() { renderMetrics(); renderPlatformTabs(); renderSessionList(); renderChat(); }

    function openCustomerModal() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      $("#modalTitle").textContent = "客户卡片";
      $("#modalBody").innerHTML = `
        <form id="customerForm">
          <div class="form-grid">
            <div class="field"><label>姓名</label><input name="name" value="${escapeHtml(customer?.name || "")}"></div>
            <div class="field"><label>联系方式</label><input name="contact" value="${escapeHtml(customer?.contact || "")}"></div>
            <div class="field"><label>公司</label><input name="company" value="${escapeHtml(customer?.company || "")}"></div>
            <div class="field"><label>行业</label><input name="industry" value="${escapeHtml(customer?.industry || "")}"></div>
            <div class="field"><label>需求类型</label><input name="needType" value="${escapeHtml(customer?.needType || session.title || "")}"></div>
            <div class="field"><label>阶段</label><input name="stage" value="${escapeHtml(customer?.stage || session.status || "新线索")}"></div>
            <div class="field full"><label>关注点</label><textarea name="focus">${escapeHtml(customer?.focus || session.summary || "")}</textarea></div>
            <div class="field full"><label>备注</label><textarea name="note">${escapeHtml(customer?.note || "")}</textarea></div>
          </div>
        </form>`;
      $("#modalActions").innerHTML = `<button class="btn" id="modalCancel" type="button">取消</button><button class="btn primary" id="modalSave" type="button">保存</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#modalCancel").addEventListener("click", closeModal);
      $("#modalSave").addEventListener("click", async () => {
        const form = $("#customerForm");
        const data = new FormData(form);
        Object.assign(customer, {
          name: String(data.get("name") || "").trim(),
          contact: String(data.get("contact") || "").trim(),
          company: String(data.get("company") || "").trim(),
          industry: String(data.get("industry") || "").trim(),
          needType: String(data.get("needType") || "").trim(),
          stage: String(data.get("stage") || "").trim(),
          focus: String(data.get("focus") || "").trim(),
          note: String(data.get("note") || "").trim(),
          updatedAt: nowText()
        });
        session.customerId = customer.id;
        session.customerName = customer.name || session.customerName;
        session.status = customer.stage || session.status;
        await persistState();
        closeModal();
        render();
        toast("客户卡已保存");
      });
    }

    async function openSummaryModal() {
      const session = currentSession();
      if (!session) return;
      let text = "";
      try {
        const result = await requestAgentAi("summary", "请总结当前会话。", session, currentCustomer(), currentKnowledgeMatches());
        text = result.text;
      } catch (error) {
        console.warn("AI API 不可用，已使用本地摘要", error);
        text = buildSummary(session);
        toast("AI API 尚未配置，已使用本地摘要");
      }
      $("#modalTitle").textContent = "会话摘要";
      $("#modalBody").innerHTML = `<div class="stack-item"><span>自动生成</span><strong style="white-space:pre-wrap;">${escapeHtml(text)}</strong></div>`;
      $("#modalActions").innerHTML = `<button class="btn" id="copySummaryNow" type="button">复制</button><button class="btn primary" id="saveSummaryNow" type="button">保存到会话</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#copySummaryNow").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(text); toast("摘要已复制"); } catch { $("#replyInput").value = text; toast("已填入回复框"); }
      });
      $("#saveSummaryNow").addEventListener("click", async () => {
        session.summary = text.split("\n").filter(Boolean).slice(0, 5).join(" ").slice(0, 140);
        await persistState();
        closeModal();
        render();
        toast("摘要已保存");
      });
    }

    function openKnowledgeModal() {
      const matches = selectedKnowledgeMatches(currentCustomer()?.focus || currentSession()?.summary || currentSession()?.title || "");
      $("#modalTitle").textContent = "知识候选";
      $("#modalBody").innerHTML = matches.map((item) => `<div class="stack-item"><span>${escapeHtml(item.category || "知识")}</span><strong>${escapeHtml(item.title || "未命名资料")}</strong></div>`).join("") || `<div class="stack-item"><span>知识候选</span><strong>暂无命中。</strong></div>`;
      $("#modalActions").innerHTML = `<button class="btn primary" id="modalOk" type="button">知道了</button>`;
      $("#modalLayer").classList.add("show");
      $("#modalLayer").setAttribute("aria-hidden", "false");
      $("#modalOk").addEventListener("click", closeModal);
    }

    function closeModal() { $("#modalLayer").classList.remove("show"); $("#modalLayer").setAttribute("aria-hidden", "true"); }

    function currentKnowledgeMatches() {
      const session = currentSession();
      const customer = currentCustomer();
      if (!session) return [];
      return selectedKnowledgeMatches(`${customer?.focus || ""} ${session.summary || ""} ${session.title || ""}`);
    }

    function latestAiInstruction(session) {
      const message = [...ensureAiThread(session)].reverse().find((item) => item.role === "human");
      return message?.text || "";
    }

    async function sendAiChatMessage() {
      const session = currentSession();
      if (!session) return toast("请先选择一个会话");
      const input = $("#aiChatInput");
      const prompt = input.value.trim();
      if (!prompt) return toast("先告诉 AI 你想怎么回复");

      const sessionId = session.id;
      const customer = currentCustomer();
      const knowledgeMatches = currentKnowledgeMatches();
      state.aiInputs[sessionId] = "";
      appendAiMessage(session, "human", prompt);
      renderAssistantWorkspace(session, customer, knowledgeMatches);

      const button = $("#sendAiMessage");
      button.disabled = true;
      button.textContent = "思考中";
      let answerText = "";
      let provider = "";
      try {
        const result = await requestAgentAi("consult", prompt, session, customer, knowledgeMatches);
        answerText = result.text;
        provider = `${result.provider} · ${result.sourceCount} 条知识`;
      } catch (error) {
        console.warn("AI API 调用失败", error);
        answerText = `API 调用失败：${error.message || "上游服务暂时不可用"}。请稍后点击发送重试。`;
        provider = "API 调用失败";
        toast("API 调用失败，未生成本地替代回答");
      } finally {
        button.disabled = false;
        button.textContent = "发送";
      }
      appendAiMessage(session, "ai", answerText, "", provider);
      renderAssistantWorkspace(currentSession(), currentCustomer(), currentKnowledgeMatches());
      if (currentSession()?.id === sessionId) {
        $("#aiChatInput").focus();
      }
    }

    async function generateReplyTemplate() {
      const session = currentSession();
      if (!session) return toast("请先选择一个会话");
      const sessionId = session.id;
      const customer = currentCustomer();
      const knowledgeMatches = currentKnowledgeMatches();
      const button = $("#generateTemplate");
      button.disabled = true;
      button.textContent = "生成中";
      const instruction = latestAiInstruction(session);
      let template = "";
      let provider = "";
      let generated = false;
      try {
        const result = await requestAgentAi("template", instruction || "请根据当前会话生成可直接发送的客服回复。", session, customer, knowledgeMatches);
        template = result.text;
        provider = `${result.provider} · ${result.sourceCount} 条知识`;
        generated = true;
      } catch (error) {
        console.warn("AI API 调用失败", error);
        template = `API 调用失败：${error.message || "上游服务暂时不可用"}。请点击重新生成模板。`;
        provider = "API 调用失败";
        toast("API 调用失败，未生成本地替代模板");
      }
      if (generated) state.aiTemplates[sessionId] = template;
      appendAiMessage(session, "ai", template, "template", provider);
      button.disabled = false;
      renderAssistantWorkspace(currentSession(), currentCustomer(), currentKnowledgeMatches());
      toast("回复模板已生成");
    }

    async function polishCustomerReply() {
      const session = currentSession();
      if (!session) return toast("请先选择一个会话");
      const sessionId = session.id;
      const customer = currentCustomer();
      const knowledgeMatches = currentKnowledgeMatches();
      const instruction = latestAiInstruction(session);
      const button = $("#polishReply");
      button.disabled = true;
      button.textContent = "整理中";

      const sourceText = state.aiTemplates[sessionId] || buildReplyTemplate(session, customer, knowledgeMatches, instruction);
      try {
        const result = await requestAgentAi("polish", `${instruction ? `额外要求：${instruction}\n` : ""}请将以下内容整理为可直接发给客户的信息：\n${sourceText}`, session, customer, knowledgeMatches);
        state.drafts[sessionId] = result.text;
        state.draftMeta[sessionId] = `${result.provider} · ${result.sourceCount} 条知识`;
      } catch (error) {
        console.warn("AI API 调用失败", error);
        state.draftMeta[sessionId] = "API 调用失败";
        appendAiMessage(session, "ai", `API 调用失败：${error.message || "上游服务暂时不可用"}。请点击重新整理。`, "", "API 调用失败");
        toast("API 调用失败，未生成本地替代回复");
      } finally {
        button.disabled = false;
      }
      renderAssistantWorkspace(currentSession(), currentCustomer(), currentKnowledgeMatches());
      if (currentSession()?.id === sessionId) {
        $("#replyInput").focus();
      }
      toast("客户回复已整理，可继续编辑");
    }

    function openAiAssist() {
      $("#assistantWorkbench").scrollIntoView({ behavior: "smooth", block: "center" });
      window.setTimeout(() => $("#aiChatInput")?.focus(), 180);
    }

    function markHuman() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      session.status = "已转人工";
      session.unread = 0;
      if (customer) customer.stage = "已转人工";
      persistMutation(session, {}, `${session.title || session.id} 已转人工`, "warn");
      toast("已写入转人工状态");
    }

    function markDone() {
      const session = currentSession();
      if (!session) return;
      const customer = ensureCustomerForSession(session);
      session.status = "已处理";
      session.unread = 0;
      if (customer) customer.stage = "已处理";
      persistMutation(session, {}, `${session.title || session.id} 已处理完成`, "success");
      toast("已标记完成");
    }

    function toggleRightPane() {
      state.rightVisible = !state.rightVisible;
      $("#rightPane").style.display = state.rightVisible ? "grid" : "none";
      toast(state.rightVisible ? "右侧面板已显示" : "右侧面板已隐藏");
    }

    function installEvents() {
      $("#searchInput").addEventListener("input", (event) => { state.search = event.target.value; renderSessionList(); });
      $("#refreshState").addEventListener("click", async () => { await loadState(); toast("已刷新工作台"); });
      $("#toggleUnread").addEventListener("click", () => { state.unreadOnly = !state.unreadOnly; $("#toggleUnread").textContent = state.unreadOnly ? "查看全部" : "只看未读"; renderSessionList(); });
      $("#newSummary").addEventListener("click", openSummaryModal);
      $("#btnCustomer").addEventListener("click", openCustomerModal);
      $("#btnAi").addEventListener("click", openAiAssist);
      $("#btnHuman").addEventListener("click", markHuman);
      $("#btnDone").addEventListener("click", markDone);
      $("#openKnowledge").addEventListener("click", openKnowledgeModal);
      $("#navInbox").addEventListener("click", () => document.querySelector(".list-pane").scrollIntoView({ block: "start", behavior: "smooth" }));
      $("#navCustomers").addEventListener("click", () => $("#customerSummary")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navKnowledge").addEventListener("click", () => $("#knowledgePreview")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navSync").addEventListener("click", () => $("#logList")?.scrollIntoView({ behavior: "smooth", block: "center" }));
      $("#navAdmin").addEventListener("click", () => { window.location.href = "/admin"; });
      $("#toggleRight").addEventListener("click", toggleRightPane);
      $("#aiChatInput").addEventListener("input", () => { const session = currentSession(); if (session) state.aiInputs[session.id] = $("#aiChatInput").value; });
      $("#aiChatInput").addEventListener("keydown", (event) => { if (event.key === "Enter" && !event.shiftKey) { event.preventDefault(); sendAiChatMessage(); } });
      $("#sendAiMessage").addEventListener("click", sendAiChatMessage);
      $("#composerTags").addEventListener("click", (event) => {
        const action = event.target.closest("[data-ai-action]")?.dataset.aiAction;
        if (action) runComposerQuickAction(action);
      });
      $("#generateTemplate").addEventListener("click", generateReplyTemplate);
      $("#polishReply").addEventListener("click", polishCustomerReply);
      $("#replyInput").addEventListener("input", () => {
        const session = currentSession();
        if (!session) return;
        state.drafts[session.id] = $("#replyInput").value;
        state.draftMeta[session.id] = "人工已编辑";
        $("#draftHint").textContent = "人工已编辑";
        updateReplyCharCount();
      });
      $("#clearReply").addEventListener("click", () => {
        const session = currentSession();
        if (!session) return;
        state.drafts[session.id] = "";
        delete state.draftMeta[session.id];
        $("#replyInput").value = "";
        $("#draftHint").textContent = "待整理";
        updateReplyCharCount();
        $("#replyInput").focus();
      });
      $("#sendReply").addEventListener("click", async () => {
        const text = $("#replyInput").value.trim();
        if (!text) return toast("请先整理或输入客户回复");
        const button = $("#sendReply");
        button.disabled = true;
        try {
          await addReplyToSession(text);
          toast("已发送给当前客户");
        } catch (error) {
          console.error("发送失败", error);
          toast(`发送失败：${error.message}`);
        } finally {
          button.disabled = false;
        }
      });
      const resizeHandle = $("#aiResizeHandle");
      if (resizeHandle) {
        let dragging = false;
        let startY = 0;
        let startHeight = readAiCollabHeight();
        const handleMove = (event) => {
          if (!dragging) return;
          applyAiCollabHeight(startHeight + (event.clientY - startY));
        };
        const stopDragging = () => {
          if (!dragging) return;
          dragging = false;
          document.body.style.userSelect = "";
          window.removeEventListener("pointermove", handleMove);
          window.removeEventListener("pointerup", stopDragging);
          window.removeEventListener("pointercancel", stopDragging);
          applyAiCollabHeight(Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--wx-ai-collab-height")) || startHeight, true);
        };
        resizeHandle.addEventListener("pointerdown", (event) => {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          dragging = true;
          startY = event.clientY;
          startHeight = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--wx-ai-collab-height")) || readAiCollabHeight();
          document.body.style.userSelect = "none";
          event.preventDefault();
          window.addEventListener("pointermove", handleMove);
          window.addEventListener("pointerup", stopDragging);
          window.addEventListener("pointercancel", stopDragging);
        });
        resizeHandle.addEventListener("dblclick", () => applyAiCollabHeight(AI_COLLAB_DEFAULT_HEIGHT, true));
      }
      $("#modalClose").addEventListener("click", closeModal);
      $("#modalLayer").addEventListener("click", (event) => { if (event.target === $("#modalLayer")) closeModal(); });
      customerSyncChannel?.addEventListener("message", (event) => {
        if (event.data?.type === "customer-updated") scheduleStateReload();
      });
      window.addEventListener("focus", () => scheduleStateReload(80));
    }

    applyAiCollabHeight(readAiCollabHeight());
    installEvents();
    loadState().catch(() => {
      state.platforms = [];
      state.sessions = [];
      render();
      toast("后端暂不可用，已显示空白工作台");
    });
  </script>
</body>
</html>
