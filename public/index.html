<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>清力技术客服 Agent</title>
  <style>
    :root {
      --ink: #111a2e;
      --muted: #607089;
      --line: #dbe5ef;
      --line-strong: #c8d7e7;
      --panel: #ffffff;
      --soft: #f6f9fd;
      --teal: #087a7c;
      --teal-dark: #075f63;
      --teal-soft: #e5f5f3;
      --gold: #b9852c;
      --blue: #2e65a7;
      --shadow: 0 24px 70px rgba(31, 49, 77, 0.13);
      font-family: "Inter", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 9%, rgba(8, 122, 124, 0.12), transparent 22%),
        radial-gradient(circle at 8% 3%, rgba(46, 101, 167, 0.12), transparent 24%),
        linear-gradient(90deg, rgba(17, 26, 46, 0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(17, 26, 46, 0.04) 1px, transparent 1px),
        linear-gradient(145deg, #eef6f7 0%, #f8fbff 42%, #ffffff 100%);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
    }

    .app {
      width: min(1440px, 100%);
      height: 100vh;
      min-height: 0;
      margin: 0 auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 12px 14px;
      border: 1px solid rgba(215, 224, 236, 0.86);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 18px 50px rgba(31, 49, 77, 0.09);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 14px;
    }

    .logo {
      width: 130px;
      height: 54px;
      border-radius: 10px;
      object-fit: cover;
      object-position: center;
      flex: 0 0 auto;
      box-shadow: 0 14px 34px rgba(17, 26, 46, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.65);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 2.4vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: clamp(15px, 1.5vw, 19px);
      line-height: 1.25;
    }

    .site-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 12px;
      color: var(--teal-dark);
      background: rgba(229, 245, 243, 0.9);
      border: 1px solid rgba(8, 122, 124, 0.12);
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 12px 28px rgba(8, 122, 124, 0.08);
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .site-link:hover {
      transform: translateY(-1px);
      background: #ffffff;
      box-shadow: 0 16px 34px rgba(8, 122, 124, 0.13);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(200, 215, 231, 0.92);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .company {
      position: relative;
      overflow: hidden;
      padding: 20px 24px 18px;
      background:
        radial-gradient(circle at 95% 0%, rgba(8, 122, 124, 0.08), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 251, 254, 0.94));
    }

    .company::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--gold));
    }

    .company-copy {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--teal-dark);
      font-size: 18px;
      line-height: 1.2;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(229, 245, 243, 0.82);
    }

    .headline {
      margin: 0 0 22px;
      font-size: clamp(24px, 2.45vw, 34px);
      line-height: 1.13;
      letter-spacing: 0;
      font-weight: 900;
      max-width: 760px;
    }

    .company p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(14px, 1.15vw, 17px);
      line-height: 1.55;
    }

    .company p + p {
      margin-top: 12px;
    }

    .signal-card {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .signal {
      min-height: 52px;
      padding: 10px 12px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 251, 253, 0.96));
      border: 1px solid rgba(199, 214, 229, 0.9);
      box-shadow: 0 10px 24px rgba(31, 49, 77, 0.06);
    }

    .signal span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
    }

    .signal strong {
      display: block;
      margin-top: 5px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 900;
    }

    .tech-detail {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .tech-item {
      padding: 12px;
      border: 1px solid rgba(199, 214, 229, 0.95);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 8px 20px rgba(31, 49, 77, 0.045);
    }

    .tech-item strong {
      display: block;
      margin-bottom: 5px;
      color: var(--teal-dark);
      font-size: 14px;
      line-height: 1.25;
      font-weight: 900;
    }

    .tech-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .card-footnote {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding-top: 10px;
      border-top: 1px solid rgba(215, 224, 236, 0.75);
    }

    .suggestions {
      width: 100%;
      margin-top: 0;
      padding: 22px 24px 24px;
      border: 1px solid rgba(186, 213, 227, 0.95);
      border-radius: 18px;
      background:
        radial-gradient(circle at 96% 12%, rgba(8, 122, 124, 0.12), transparent 28%),
        radial-gradient(circle at 3% 0%, rgba(46, 101, 167, 0.1), transparent 22%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(247, 252, 253, 0.92));
      box-shadow: 0 20px 46px rgba(31, 49, 77, 0.08);
    }

    .suggestion-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .suggestion-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
    }

    .suggestion-title::before {
      content: "";
      width: 8px;
      height: 30px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--teal), var(--blue));
      box-shadow: 0 8px 18px rgba(8, 122, 124, 0.22);
    }

    .suggestion-note {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .topic-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .topic {
      position: relative;
      min-height: 66px;
      padding: 0 18px 0 56px;
      border: 1px solid rgba(8, 122, 124, 0.13);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(249, 253, 255, 0.96));
      color: var(--ink);
      font: inherit;
      font-size: 19px;
      font-weight: 850;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(31, 49, 77, 0.055);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .topic::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      width: 24px;
      height: 24px;
      border-radius: 9px;
      transform: translateY(-50%);
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,.95) 0 3px, transparent 4px),
        linear-gradient(135deg, rgba(8, 122, 124, 0.9), rgba(46, 101, 167, 0.9));
      box-shadow: 0 8px 18px rgba(8, 122, 124, 0.2);
    }

    .topic::after {
      content: "→";
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(8, 122, 124, 0.5);
      font-size: 20px;
      font-weight: 900;
      opacity: 0;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .topic:hover {
      transform: translateY(-3px);
      border-color: rgba(8, 122, 124, 0.38);
      background: #ffffff;
      box-shadow: 0 18px 34px rgba(31, 49, 77, 0.1);
    }

    .topic:hover::after {
      opacity: 1;
      transform: translate(4px, -50%);
    }

    .topic:focus-visible,
    .site-link:focus-visible,
    .send:focus-visible,
    .contact:focus-visible {
      outline: 3px solid rgba(11, 119, 123, 0.25);
      outline-offset: 3px;
    }

    .chat {
      flex: 1;
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      border-color: rgba(200, 215, 231, 0.98);
    }

    .notice {
      padding: 13px 18px;
      color: var(--muted);
      font-size: clamp(14px, 1.2vw, 17px);
      line-height: 1.45;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .agent-strip {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(229, 245, 243, 0.7), rgba(255, 255, 255, 0.86));
      box-shadow: 0 8px 22px rgba(31, 49, 77, 0.05);
    }

    .agent-id {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 850;
      font-size: 14px;
    }

    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #19a36a;
      box-shadow: 0 0 0 7px rgba(25, 163, 106, 0.12);
      flex: 0 0 auto;
    }

    .agent-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .agent-tags span {
      padding: 5px 8px;
      border-radius: 999px;
      color: #536176;
      background: #f2f6fa;
      font-size: 12px;
      font-weight: 700;
    }

    .messages {
      min-height: 0;
      padding: 18px 24px;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(247, 250, 253, 0.88), rgba(255, 255, 255, 0.96));
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 10px;
    }

    .messages::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: rgba(96, 112, 137, 0.28);
      background-clip: content-box;
    }

    .message {
      width: 100%;
      margin-bottom: 12px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      color: var(--ink);
      font-size: clamp(14px, 1.15vw, 16px);
      line-height: 1.55;
      box-shadow: 0 12px 28px rgba(31, 49, 77, 0.065);
    }

    .message.user {
      margin-left: auto;
      width: fit-content;
      max-width: min(760px, 100%);
      background: linear-gradient(145deg, #087a7c, #075f63);
      color: #ffffff;
      border-color: var(--teal);
      border-bottom-right-radius: 6px;
    }

    .message.agent {
      border-bottom-left-radius: 6px;
    }

    .message.agent strong {
      color: var(--teal-dark);
    }

    .message-card {
      width: 100%;
      margin-bottom: 12px;
      animation: cardIn 180ms ease-out;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(17, 26, 46, 0.28);
      backdrop-filter: blur(10px);
    }

    .contact-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(100vh - 40px));
      overflow: auto;
      padding: 22px;
      border: 1px solid rgba(215, 224, 236, 0.95);
      border-radius: 16px;
      background:
        radial-gradient(circle at 100% 0%, rgba(8, 122, 124, 0.08), transparent 26%),
        #ffffff;
      box-shadow: 0 28px 80px rgba(17, 26, 46, 0.24);
    }

    .contact-card h3 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.25;
    }

    .contact-card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .dialog-card {
      position: relative;
      width: min(420px, 100%);
      padding: 24px 24px 20px;
      border: 1px solid rgba(215, 224, 236, 0.95);
      border-radius: 16px;
      background:
        radial-gradient(circle at 100% 0%, rgba(8, 122, 124, 0.1), transparent 30%),
        #ffffff;
      box-shadow: 0 28px 80px rgba(17, 26, 46, 0.24);
    }

    .dialog-card h3 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.25;
    }

    .dialog-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .dialog-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: #52627a;
      background: rgba(255, 255, 255, 0.9);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: #41516a;
      font-size: 13px;
      font-weight: 750;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fbfdff;
      font: inherit;
      font-size: 14px;
      resize: vertical;
    }

    .field textarea {
      min-height: 72px;
    }

    .field input:focus,
    .field textarea:focus {
      outline: 0;
      border-color: rgba(8, 122, 124, 0.55);
      box-shadow: 0 0 0 3px rgba(8, 122, 124, 0.1);
      background: #ffffff;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
    }

    .ghost,
    .primary {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .ghost {
      border: 1px solid var(--line);
      color: var(--muted);
      background: #ffffff;
    }

    .primary {
      border: 0;
      color: #ffffff;
      background: linear-gradient(145deg, #0a8588, #066368);
    }

    .contact {
      min-height: 52px;
      padding: 0 18px;
      border: 1px solid rgba(11, 119, 123, 0.22);
      border-radius: 14px;
      background: var(--teal-soft);
      color: var(--teal-dark);
      font: inherit;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .contact:hover {
      transform: translateY(-1px);
      background: #ffffff;
      box-shadow: 0 12px 26px rgba(8, 122, 124, 0.12);
    }

    .composer {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      padding: 16px 20px 18px;
      border-top: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), #ffffff);
      box-shadow: 0 -10px 28px rgba(31, 49, 77, 0.06);
    }

    .input {
      width: 100%;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--ink);
      font: inherit;
      font-size: 17px;
      background: #fbfdff;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .input:focus {
      outline: 0;
      border-color: rgba(8, 122, 124, 0.55);
      box-shadow: 0 0 0 4px rgba(8, 122, 124, 0.1);
      background: #ffffff;
    }

    .input::placeholder {
      color: #7f8796;
    }

    .send {
      min-width: 58px;
      min-height: 52px;
      padding: 0 16px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(145deg, #0a8588, #066368);
      color: #ffffff;
      font: inherit;
      font-size: 19px;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(8, 122, 124, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .send:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(8, 122, 124, 0.26);
    }

    @media (max-width: 900px) {
      .app {
        padding: 12px;
        gap: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 14px;
      }

      .site-link {
        width: 100%;
      }

      .intro-grid {
        grid-template-columns: 1fr;
      }

      .company {
        padding: 18px;
      }

      .signal-card {
        grid-template-columns: 1fr;
      }

      .tech-detail {
        grid-template-columns: 1fr;
      }

      .topic-list {
        grid-template-columns: 1fr 1fr;
      }

      .messages {
        padding: 14px;
      }

      .message {
        padding: 12px 14px;
      }
    }

    @media (max-width: 560px) {
      .brand {
        gap: 12px;
        align-items: flex-start;
        flex-direction: column;
      }

      .logo {
        width: 112px;
        height: 46px;
      }

      h1 {
        font-size: 24px;
      }

      .topic {
        min-height: 38px;
      }

      .topic-list {
        grid-template-columns: 1fr;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }

      .suggestion-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .suggestion-note {
        white-space: normal;
      }

      .agent-strip {
        align-items: flex-start;
        flex-direction: column;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .contact,
      .send {
        width: 100%;
      }
    }

    /* WeChat-inspired visual overrides */
    :root {
      --wx-bg: #f5f6f7;
      --wx-surface: #ffffff;
      --wx-surface-soft: #f7f8fa;
      --wx-line: #e5e6eb;
      --wx-ink: #1f2329;
      --wx-muted: #646a73;
      --wx-green: #07c160;
      --wx-green-deep: #06ad56;
      --wx-blue: #3c7eff;
      --wx-shadow: 0 4px 18px rgba(31, 35, 41, 0.05);
      --wx-shadow-strong: 0 8px 24px rgba(31, 35, 41, 0.08);
    }

    body {
      background: var(--wx-bg) !important;
      color: var(--wx-ink) !important;
    }

    .app,
    .topbar,
    .panel,
    .card,
    .shell,
    .section,
    .workspace,
    .sidebar,
    .list-pane,
    .right-pane,
    .rail,
    .composer,
    .modal-content,
    .drawer,
    .filter-bar,
    .toolbar,
    .search,
    .search-wrap,
    .summary,
    .stats,
    .queue-item,
    .contact-card,
    .knowledge-card,
    .message,
    .bubble,
    .table-panel,
    .empty-state {
      border-color: var(--wx-line) !important;
      background: var(--wx-surface) !important;
      box-shadow: var(--wx-shadow) !important;
      backdrop-filter: none !important;
    }

    .app {
      background: transparent !important;
    }

    .topbar,
    .panel,
    .card,
    .shell,
    .section,

  <script>
    const messages = document.querySelector("#messages");
    const form = document.querySelector("#composer");
    const input = document.querySelector("#question");
    const contactButton = document.querySelector("#contactButton");
    const topics = document.querySelectorAll(".topic");
    const backendCustomerKey = "qingli.backend.customers.v3";
    const backendSyncChannelName = "qingli.customer.database.sync.v1";
    const backendSyncEventKey = "qingli.backend.customers.syncEvent.v1";
    const sessionIdKey = "qingli.frontend.sessionId.v1";
    const customerIdKey = "qingli.frontend.customerId.v1";
    const backendSyncChannel = "BroadcastChannel" in window ? new BroadcastChannel(backendSyncChannelName) : null;
    const useServerDatabase = location.protocol === "http:" || location.protocol === "https:";

    function stableId(key, prefix) {
      const existing = localStorage.getItem(key);
      if (existing) return existing;
      const value = `${prefix}-${Date.now().toString().slice(-6)}${Math.floor(Math.random() * 90 + 10)}`;
      localStorage.setItem(key, value);
      return value;
    }

    const sessionId = stableId(sessionIdKey, "S");
    const customerId = stableId(customerIdKey, "C");

    function loadBackendCustomers() {
      try {
        const stored = JSON.parse(localStorage.getItem(backendCustomerKey) || "[]");
        return Array.isArray(stored) ? stored : [];
      } catch {
        return [];
      }
    }

    function currentBackendProfile() {
      return loadBackendCustomers().find((item) => item.id === customerId) || null;
    }

    async function saveProfileToServer(profile) {
      if (!useServerDatabase) return;
      try {
        await fetch(`/api/customers/${encodeURIComponent(profile.id)}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(profile)
        });
      } catch (error) {
        console.warn("客户资料同步到本地后端失败", error);
      }
    }

    function saveToBackendProfile(data = {}) {
      const customers = loadBackendCustomers();
      const existing = customers.find((item) => item.id === customerId);
      const now = new Date().toLocaleString("zh-CN", { hour12: false });
      const nextContactCard = data.needType === "前台留资"
        ? {
            name: data.name || "",
            contact: data.contact || "",
            topic: data.topic || "",
            other: data.other || "",
            updatedAt: now
          }
        : existing?.contactCard;
      const next = {
        id: customerId,
        name: data.name || existing?.contactCard?.name || existing?.name || "未命名客户",
        company: existing?.company || "未知",
        contact: data.contact || existing?.contactCard?.contact || existing?.contact || "",
        industry: existing?.industry || "未知",
        needType: data.needType || existing?.needType || "前台咨询",
        focus: data.topic || existing?.contactCard?.topic || existing?.focus || data.question || "前台咨询待整理",
        interest: existing?.interest || "清力技术 / 自超滑技术 / 空心杯电机",
        repeated: existing?.repeated || data.question || "待观察",
        depth: existing?.depth || "中等",
        stage: data.contact ? "已沟通" : existing?.stage || "新线索",
        risk: existing?.risk || "低",
        suggestion: data.contact ? "客户已主动提交资料卡，建议业务人员跟进。" : "客户已产生前台咨询，可继续观察需求。",
        note: data.other || existing?.contactCard?.other || existing?.note || `来源：前台客服页；会话ID：${sessionId}`,
        highValue: Boolean(existing?.highValue || data.contact || data.topic),
        createdAt: existing?.createdAt || now,
        updatedAt: now,
        source: "前台客服页",
        sessionId,
        contactCard: nextContactCard
      };
      if (existing) {
        Object.assign(existing, next);
      } else {
        customers.unshift(next);
      }
      localStorage.setItem(backendCustomerKey, JSON.stringify(customers));
      localStorage.setItem(backendSyncEventKey, JSON.stringify({ at: Date.now(), customerId, count: customers.length }));
      backendSyncChannel?.postMessage({ type: "customer-updated", customer: next, customers, at: Date.now() });
      saveProfileToServer(next);
    }

    const replies = [
      {
        keys: ["公司", "简介"],
        type: "company"
      },
      {
        keys: ["团队", "创始", "郑泉水"],
        type: "team"
      },
      {
        keys: ["技术", "方向", "自超滑"],
        type: "technology"
      },
      {
        keys: ["其他应用", "应用", "射频开关", "微动发电机"],
        type: "otherApplications"
      }
    ];

    function addMessage(text, type = "agent") {
      const node = document.createElement("div");
      node.className = `message ${type}`;
      node.textContent = text;
      messages.appendChild(node);
      messages.scrollTop = messages.scrollHeight;
    }

    function addCompanyCard() {
      const wrapper = document.createElement("div");
      wrapper.className = "message-card";
      wrapper.innerHTML = `

    function showSuccessDialog() {
      const existing = document.querySelector("#successDialog");
      if (existing) existing.remove();

      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "successDialog";
      modal.setAttribute("role", "dialog");
      modal.setAttribute("aria-modal", "true");
      modal.setAttribute("aria-label", "资料提交成功");

      const card = document.createElement("div");
      card.className = "dialog-card";
      card.innerHTML = `
        <button class="dialog-close" type="button" aria-label="关闭">×</button>
        <h3>资料已提交</h3>
        <p>收到，感谢您的留资，我们会尽快与您沟通。</p>
        <div class="card-actions">
          <button class="primary" type="button" data-action="confirm">确认</button>
        </div>
      `;
      modal.appendChild(card);
      document.body.appendChild(modal);

      const closeDialog = () => modal.remove();
      card.querySelector(".dialog-close").addEventListener("click", closeDialog);
      card.querySelector('[data-action="confirm"]').addEventListener("click", closeDialog);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeDialog();
      });
    }

    function showContactCard() {
      const existing = document.querySelector("#contactModal");
      if (existing) {
        return;
      }

      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "contactModal";
      modal.setAttribute("role", "dialog");
      modal.setAttribute("aria-modal", "true");
      modal.setAttribute("aria-label", "留下联系方式");

      const card = document.createElement("form");
      card.className = "contact-card";

      card.innerHTML = `

      `;
      modal.appendChild(card);
      document.body.appendChild(modal);

      const savedProfile = currentBackendProfile();
      const savedCard = savedProfile?.contactCard || {};
      card.querySelector("#contactName").value = savedCard.name || "";
      card.querySelector("#contactInfo").value = savedCard.contact || "";
      card.querySelector("#contactTopic").value = savedCard.topic || "";
      card.querySelector("#contactOther").value = savedCard.other || "";

      card.querySelector("#contactName").focus();

      let closeOnEscape;
      const closeModal = () => {
        modal.remove();
        if (closeOnEscape) {
          document.removeEventListener("keydown", closeOnEscape);
        }
      };

      card.querySelector('[data-action="cancel"]').addEventListener("click", () => {
        closeModal();
      });

      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      closeOnEscape = (event) => {
        if (event.key === "Escape") {
          closeModal();
        }
      };
      document.addEventListener("keydown", closeOnEscape);

      card.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = new FormData(card);
        const profileData = {
          name: String(data.get("name") || "").trim(),
          contact: String(data.get("contact") || "").trim(),
          topic: String(data.get("topic") || "").trim(),
          other: String(data.get("other") || "").trim(),
          needType: "前台留资"
        };
        closeModal();
        saveToBackendProfile(profileData);
        window.setTimeout(showSuccessDialog, 120);
      });
    }

        addSpecAnswer();

        addPriceAnswer();

        return;
      }
      if (hasAny(normalized, ["郑泉水", "创始人", "团队", "院士", "科学家", "谁创办"])) {
        addTeamShortAnswer();
        return;
      }
      if (hasAny(normalized, ["产品", "做什么", "业务", "有什么", "有哪些", "卖什么", "主营"])) {
        addProductAnswer();
        return;
      }
      const matched = replies.find((item) => item.keys.some((key) => normalized.includes(key)));
      if (matched && matched.type === "company") {
        addCompanyCard();
        return;
      }
      if (matched && matched.type === "team") {
        addTeamCard();
        return;
      }
      if (matched && matched.type === "technology") {
        addTechnologyCard();
        return;
      }
      if (matched && matched.type === "otherApplications") {
        addOtherApplicationsCard();
        return;
      }
      if (["自超滑", "空心杯", "灵巧手"].some((key) => normalized.includes(key)) || normalized.includes("技术方向")) {
        addTechnologyCard();
        return;
      }
      const text = matched
        ? matched.text
        : "我先收到您的问题了。为了更准确判断，您可以补充一下咨询对象、使用场景、当前阶段，以及您更关心技术原理、产品适配还是合作沟通。";
      addMessage(text);
    }

    function submitQuestion(value) {
      const question = value.trim();
      if (!question) return;
      saveToBackendProfile({
        question,
        topic: question,
        needType: "前台咨询"
      });
      addMessage(question, "user");
      input.value = "";
      window.setTimeout(() => answer(question), 220);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      submitQuestion(input.value);
    });

    contactButton.addEventListener("click", () => {
      showContactCard();
    });

    topics.forEach((topic) => {
      topic.addEventListener("click", () => {
        submitQuestion(topic.dataset.question || topic.textContent);
      });
    });
  </script>
</body>
</html>
