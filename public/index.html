<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>清力技术客服</title>
  <style>
    :root {
      --ink: #102033;
      --muted: #607089;
      --line: #d9e4ef;
      --panel: rgba(255,255,255,.92);
      --soft: #f6f9fd;
      --teal: #087a7c;
      --teal-dark: #075f63;
      --blue: #315f9f;
      --gold: #b9852c;
      --shadow: 0 24px 70px rgba(31,49,77,.12);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      overflow: hidden;
      background:
        radial-gradient(circle at 90% 8%, rgba(8,122,124,.12), transparent 22%),
        radial-gradient(circle at 6% 2%, rgba(49,95,159,.10), transparent 24%),
        linear-gradient(90deg, rgba(16,32,51,.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16,32,51,.04) 1px, transparent 1px),
        linear-gradient(145deg, #eef7f7 0%, #f8fbff 46%, #ffffff 100%);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
    }
    a { color: inherit; }
    .app {
      width: min(1480px, 100%);
      height: 100vh;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }
    .topbar, .panel, .bubble, .side-card, .modal-card {
      border: 1px solid rgba(202,216,227,.92);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .topbar {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .topbar::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--gold));
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .logo {
      width: 124px;
      height: 52px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 12px 28px rgba(17,26,46,.14);
      flex: 0 0 auto;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(22px, 2.2vw, 32px); line-height: 1.1; }
    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill, .link-btn, .ghost-btn, .topic-btn, .send-btn, .close-btn, .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border-radius: 999px;
      padding: 0 14px;
      border: 1px solid transparent;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .pill { color: var(--teal-dark); background: #e7f5f3; border-color: #c8e5e2; }
    .link-btn, .ghost-btn { background: #fff; border-color: var(--line); color: var(--ink); text-decoration: none; }
    .primary-btn, .send-btn { color: #fff; background: linear-gradient(135deg, var(--teal), var(--blue)); box-shadow: 0 12px 24px rgba(8,122,124,.18); }
    .ghost-btn { font-size: 14px; }
    .layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(300px, 0.7fr);
      gap: 14px;
    }
    .chat-shell, .sidebar {
      min-height: 0;
      border-radius: 20px;
      overflow: hidden;
    }
    .chat-shell { display: grid; grid-template-rows: auto minmax(0, 1fr) auto; }
    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .agent-id {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--teal-dark);
      font-weight: 900;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 0 0 rgba(16,185,129,.45);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse { 70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); } 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } }
    .messages {
      min-height: 0;
      overflow: auto;
      padding: 18px 20px 12px;
      background:
        radial-gradient(circle at 100% 0%, rgba(8,122,124,.06), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.86), rgba(248,251,254,.92));
    }
    .messages::-webkit-scrollbar { width: 10px; }
    .messages::-webkit-scrollbar-thumb { border: 3px solid transparent; border-radius: 999px; background: rgba(96,112,137,.28); background-clip: content-box; }
    .bubble {
      max-width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border-radius: 18px;
    }
    .bubble.agent { background: #fff; }
    .bubble.user {
      margin-left: auto;
      width: fit-content;
      max-width: min(760px, 100%);
      color: #fff;
      background: linear-gradient(145deg, var(--teal), var(--teal-dark));
    }
    .bubble h3 { margin-bottom: 8px; font-size: 17px; }
    .bubble p { color: var(--muted); line-height: 1.55; font-size: 14px; }
    .bubble.user p { color: rgba(255,255,255,.9); }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    .info-card {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #f8fbfd);
      padding: 14px 14px 12px;
      box-shadow: 0 10px 24px rgba(31,49,77,.06);
    }
    .info-card h4 { margin: 0 0 6px; font-size: 15px; }
    .info-card p { color: var(--muted); line-height: 1.55; font-size: 13px; }
    .composer {
      padding: 14px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input {
      flex: 1;
      min-width: 0;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    .input:focus { border-color: rgba(8,122,124,.45); box-shadow: 0 0 0 4px rgba(8,122,124,.08); }
    .send-btn, .primary-btn, .close-btn { min-width: 92px; border: 0; }
    .sidebar {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }
    .side-card {
      border-radius: 18px;
      padding: 14px;
    }
    .side-card h3 { font-size: 17px; margin-bottom: 10px; }
    .topic-list { display: grid; gap: 10px; }
    .topic-btn {
      width: 100%;
      justify-content: flex-start;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }
    .topic-btn small { display: block; color: var(--muted); font-weight: 600; margin-top: 3px; }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .meta .pill { min-height: 30px; font-size: 12px; }
    .side-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(9, 18, 32, .46);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal-mask.open { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
    }
    .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .modal-body { padding: 18px 20px 20px; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; font-weight: 800; color: #314057; }
    .field input, .field textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 12px 14px;
      outline: none;
      font: inherit;
      background: #fff;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .field input:focus, .field textarea:focus { border-color: rgba(8,122,124,.45); box-shadow: 0 0 0 4px rgba(8,122,124,.08); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(16,32,51,.92);
      color: #fff;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .toast.show { opacity: 1; }
    .notice {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(229,245,243,.8);
      border: 1px solid rgba(8,122,124,.12);
      color: var(--teal-dark);
      font-size: 13px;
      line-height: 1.55;
    }
    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    }
    @media (max-width: 720px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .status-row { justify-content: flex-start; }
      .card-grid, .field-grid { grid-template-columns: 1fr; }
      .composer { flex-wrap: wrap; }
      .send-btn, .primary-btn, .close-btn { min-width: 0; flex: 1 1 0; }
      .logo { width: 108px; height: 46px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="logo" src="/friction-x-logo.png" alt="清力技术">
        <div>
          <h1>清力技术客服</h1>
          <p class="subtitle">亲，欢迎咨询深圳清力技术有限公司~（内容由AI生成）</p>
        </div>
      </div>
      <div class="status-row">
        <span class="pill" id="connectionState">已连接真实后端</span>
        <a class="link-btn" href="https://veronica-dqy.org" target="_blank" rel="noopener">官网链接</a>
        <button class="ghost-btn" id="openContactBtn" type="button">留下联系方式</button>
      </div>
    </header>

    <main class="layout">
      <section class="chat-shell panel">
        <div class="chat-head">
          <div class="agent-id"><span class="pulse"></span><span>在线</span><span style="color:var(--muted);font-weight:700;">AI 客服助手</span></div>
          <div class="meta">
            <span class="pill">实时留资</span>
            <span class="pill">真实后端</span>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <form class="composer" id="composer">
          <input class="input" id="question" autocomplete="off" placeholder="请输入您的问题">
          <button class="send-btn" type="submit">发送</button>
          <button class="ghost-btn" id="contactButton" type="button">留下联系方式</button>
        </form>
      </section>

      <aside class="sidebar">
        <section class="side-card">
          <h3>先了解这些</h3>
          <div class="topic-list">
            <button class="topic-btn" data-topic="company">
              公司简介
              <small>清力技术是做什么的、和自超滑是什么关系</small>
            </button>
            <button class="topic-btn" data-topic="tech">
              技术方向
              <small>自超滑技术、空心杯电机、MEMS 射频开关</small>
            </button>
            <button class="topic-btn" data-topic="team">
              我们的团队
              <small>郑泉水团队与清力技术的研发协同</small>
            </button>
            <button class="topic-btn" data-topic="applications">
              自超滑技术的其他应用
              <small>机器人、医疗、6G、MEMS、航天等</small>
            </button>
          </div>
        </section>

        <section class="side-card">
          <h3>留资说明</h3>
          <p class="side-note">留下联系方式完全自愿，称呼、联系方式、希望交流内容、其他都不是必填。提交后会进入后台客户档案，方便后续沟通。</p>
          <div class="notice">这个页面提交的数据会直接写到同一个后端，后台打开就能看到。不是本地假数据。</div>
        </section>

        <section class="side-card">
          <h3>当前状态</h3>
          <p class="side-note" id="statusText">正在连接后端...</p>
          <div class="meta" style="margin-top:12px;">
            <span class="pill">会话 ID <span id="sessionLabel" style="margin-left:6px;">-</span></span>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div class="modal-mask" id="contactModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="contactTitle">
      <div class="modal-head">
        <div>
          <h2 id="contactTitle" style="font-size:22px;">留下联系方式</h2>
          <p class="subtitle">下面每一项都不是必填，您可以只填方便留下的信息。</p>
        </div>
        <button class="close-btn" type="button" data-close>×</button>
      </div>
      <form class="modal-body" id="contactForm">
        <div class="field-grid">
          <div class="field">
            <label for="contactName">称呼</label>
            <input id="contactName" placeholder="例如：王女士">
          </div>
          <div class="field">
            <label for="contactInfo">联系方式</label>
            <input id="contactInfo" placeholder="例如：手机号 / 微信 / 邮箱">
          </div>
          <div class="field">
            <label for="contactTopic">希望交流的内容</label>
            <input id="contactTopic" placeholder="例如：空心杯电机选型">
          </div>
          <div class="field">
            <label for="contactOther">其他</label>
            <input id="contactOther" placeholder="例如：方便联系的时间">
          </div>
        </div>
        <div class="modal-actions">
          <button class="ghost-btn" type="button" data-close>关闭</button>
          <button class="primary-btn" type="submit">确认留资</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const sessionKey = "qingli.front.session.id";
    const draftKeyPrefix = "qingli.front.contact.draft.";
    const messages = document.getElementById("messages");
    const form = document.getElementById("composer");
    const input = document.getElementById("question");
    const contactButton = document.getElementById("contactButton");
    const openContactBtn = document.getElementById("openContactBtn");
    const modal = document.getElementById("contactModal");
    const contactForm = document.getElementById("contactForm");
    const statusText = document.getElementById("statusText");
    const connectionState = document.getElementById("connectionState");
    const sessionLabel = document.getElementById("sessionLabel");
    const draft = document.getElementById("contactName");
    const contactInfo = document.getElementById("contactInfo");
    const contactTopic = document.getElementById("contactTopic");
    const contactOther = document.getElementById("contactOther");

    function uid(prefix) {
      return `${prefix}-${Date.now().toString().slice(-6)}${Math.floor(Math.random() * 90 + 10)}`;
    }

    function getSessionId() {
      let id = sessionStorage.getItem(sessionKey);
      if (!id) {
        id = uid("S");
        sessionStorage.setItem(sessionKey, id);
      }
      return id;
    }

    const sessionId = getSessionId();
    sessionLabel.textContent = sessionId;

    function draftKey() {
      return `${draftKeyPrefix}${sessionId}`;
    }

    function showToast(text) {
      const node = document.getElementById("toast");
      node.textContent = text;
      node.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => node.classList.remove("show"), 2200);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[m]));
    }

    function addBubble(html, type = "agent") {
      const node = document.createElement("article");
      node.className = `bubble ${type}`;
      node.innerHTML = html;
      messages.appendChild(node);
      messages.scrollTop = messages.scrollHeight;
      return node;
    }

    function addText(text, type = "agent") {
      return addBubble(`<p>${escapeHtml(text).replace(/\n/g, "<br>")}</p>`, type);
    }

    function renderInfoCard(title, text, points = [], cta) {
      const wrapper = document.createElement("article");
      wrapper.className = "bubble agent";
      wrapper.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(text)}</p>
        ${points.length ? `<div class="card-grid">${points.map((item) => `
          <div class="info-card">
            <h4>${escapeHtml(item.title)}</h4>
            <p>${escapeHtml(item.text)}</p>
          </div>
        `).join("")}</div>` : ""}
        ${cta ? `<div style="margin-top:12px;"><button class="primary-btn" type="button" data-open-contact>留下联系方式</button></div>` : ""}
      `;
      messages.appendChild(wrapper);
      messages.scrollTop = messages.scrollHeight;
      wrapper.querySelector("[data-open-contact]")?.addEventListener("click", () => openContactModal());
    }

    function loadDraft() {
      try {
        return JSON.parse(localStorage.getItem(draftKey()) || "{}") || {};
      } catch {
        return {};
      }
    }

    function saveDraft(data) {
      localStorage.setItem(draftKey(), JSON.stringify(data));
    }

    let serverProfile = null;

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: "include",
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        },
        ...options
      });
      const text = await response.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { ok: false, raw: text }; }
      if (!response.ok) {
        throw new Error(data.message || response.statusText || "请求失败");
      }
      return data;
    }

    function currentDraft() {
      return {
        name: document.getElementById("contactName").value.trim(),
        contact: document.getElementById("contactInfo").value.trim(),
        topic: document.getElementById("contactTopic").value.trim(),
        other: document.getElementById("contactOther").value.trim()
      };
    }

    function fillContactForm(data = {}) {
      document.getElementById("contactName").value = data.name || "";
      document.getElementById("contactInfo").value = data.contact || "";
      document.getElementById("contactTopic").value = data.topic || "";
      document.getElementById("contactOther").value = data.other || "";
    }

    function openContactModal() {
      const draftData = loadDraft();
      fillContactForm(draftData);
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      document.getElementById("contactName").focus();
    }

    function closeContactModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    async function refreshConnection() {
      try {
        const data = await api("/api/health", { method: "GET", headers: {} });
        connectionState.textContent = "已连接真实后端";
        statusText.textContent = `后端状态正常，服务时间：${data.time}`;
      } catch (error) {
        connectionState.textContent = "后端连接失败";
        statusText.textContent = "当前页面需要通过域名或本地服务打开才能访问后端。";
      }
    }

    async function loadServerProfile() {
      try {
        const data = await api(`/api/public/customers/${encodeURIComponent(sessionId)}`, { method: "GET", headers: {} });
        serverProfile = data.customer || null;
        const contactCard = serverProfile?.contactCard || {};
        const draftData = {
          name: contactCard.name || "",
          contact: contactCard.contact || "",
          topic: contactCard.topic || "",
          other: contactCard.other || ""
        };
        if (draftData.name || draftData.contact || draftData.topic || draftData.other) {
          saveDraft(draftData);
          fillContactForm(draftData);
          showToast("已回填您上次填写的内容");
        }
      } catch {}
    }

    async function saveLead(payload) {
      const body = {
        ...payload,
        sessionId,
        source: "前台客服页"
      };
      const data = await api(`/api/customers/${encodeURIComponent(sessionId)}`, {
        method: "POST",
        body: JSON.stringify(body)
      });
      serverProfile = data.customer;
      return data.customer;
    }

    function suggestAnswer(question) {
      const lower = question.toLowerCase();
      if (lower.includes("公司") || lower.includes("简介")) {
        return {
          title: "公司简介",
          text: "清力技术围绕自超滑共性技术做产品化，核心目标是把低摩擦、低磨损、长寿命的能力带到机器人、医疗和精密运动场景。",
          points: [
            { title: "定位", text: "自超滑技术工程化应用公司" },
            { title: "重点", text: "机器人、医疗、精密制造" }
          ]
        };
      }
      if (lower.includes("技术") || lower.includes("自超滑") || lower.includes("摩擦")) {
        return {
          title: "技术方向",
          text: "资料里最核心的三个方向是：自超滑空心杯电机、自超滑 MEMS 射频开关、自超滑微动发电机。",
          points: [
            { title: "空心杯电机", text: "面向人形机器人、医疗器械、无人机、航天与探测" },
            { title: "MEMS 射频开关", text: "面向 5G/6G、相控阵雷达和高端测试设备" },
            { title: "微动发电机", text: "面向物联网、智慧工厂、智慧铁路等场景" }
          ]
        };
      }
      if (lower.includes("团队") || lower.includes("创始人")) {
        return {
          title: "我们的团队",
          text: "清力技术与郑泉水团队的长期研究积累有关，资料显示团队覆盖基础研究、产品研发、市场、供应链和实验平台等多个方向。",
          points: [
            { title: "研究源头", text: "自超滑基础研究积累" },
            { title: "落地方向", text: "从实验室走向产品化" }
          ]
        };
      }
      if (lower.includes("应用")) {
        return {
          title: "自超滑技术的其他应用",
          text: "除了电机之外，自超滑还可延伸到 MEMS、射频开关、微发电机、精密导轨、轴承和更多高可靠微系统。",
          points: [
            { title: "机器人", text: "关节、灵巧手、执行器" },
            { title: "医疗", text: "高精度微器械和设备" },
            { title: "通信", text: "6G、雷达、射频器件" }
          ]
        };
      }
      return {
        title: "我先收到您的问题了",
        text: "您可以继续问我公司、技术方向、应用场景，或者直接留下联系方式，我们会尽快与您沟通。"
      };
    }

    async function submitQuestion(question) {
      const text = question.trim();
      if (!text) return;
      addText(text, "user");
      input.value = "";
      try {
        const draftData = loadDraft();
        await saveLead({
          question: text,
          topic: text,
          needType: "前台咨询",
          name: draftData.name || serverProfile?.contactCard?.name || "",
          contact: draftData.contact || serverProfile?.contactCard?.contact || "",
          contactCard: Object.keys(draftData).length ? draftData : serverProfile?.contactCard || null
        });
      } catch (error) {
        showToast("留资未写入后台，请检查网络或后端");
      }
      const reply = suggestAnswer(text);
      setTimeout(() => renderInfoCard(reply.title, reply.text, reply.points || [], true), 220);
    }

    function appendWelcome() {
      addBubble(`
        <h3>亲，欢迎咨询深圳清力技术有限公司~（内容由AI生成）</h3>
        <p>您可以先了解公司、技术方向、我们的团队和自超滑技术的其他应用；如果想继续沟通，也可以直接留下联系方式。</p>
      `, "agent");
      renderInfoCard(
        "公司简介",
        "清力技术围绕自超滑共性技术和空心杯电机做产品化，源自基础研究积累，目标是把低摩擦、低磨损的能力带入机器人、医疗和精密运动场景。",
        [
          { title: "核心能力", text: "低摩擦 / 低磨损 / 长寿命" },
          { title: "应用重点", text: "机器人、医疗、精密制造" }
        ],
        true
      );
    }

    document.querySelectorAll("[data-topic]").forEach((button) => {
      button.addEventListener("click", () => {
        const topic = button.getAttribute("data-topic");
        const map = {
          company: "公司简介",
          tech: "技术方向",
          team: "我们的团队",
          applications: "自超滑技术的其他应用"
        };
        submitQuestion(map[topic] || button.textContent.trim());
      });
    });

    contactButton.addEventListener("click", openContactModal);
    openContactBtn.addEventListener("click", openContactModal);
    modal.querySelectorAll("[data-close]").forEach((button) => button.addEventListener("click", closeContactModal));
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeContactModal();
    });

    contactForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = currentDraft();
      const hasAny = Object.values(data).some((value) => value.trim());
      if (!hasAny) {
        closeContactModal();
        showToast("已关闭资料卡");
        return;
      }
      saveDraft(data);
      try {
        await saveLead({
          needType: "前台留资",
          question: data.topic || data.other || "留下联系方式",
          name: data.name,
          contact: data.contact,
          focus: data.topic || "留资",
          note: data.other || "",
          contactCard: data,
          stage: "已沟通",
          source: "前台客服页"
        });
        closeContactModal();
        addBubble(`
          <h3>收到，感谢您的留资，我们会尽快与您沟通</h3>
          <p>您填写的信息已经写入后台客户档案，后续可以继续在这里提问。</p>
        `, "agent");
        showToast("已保存到真实后台");
      } catch (error) {
        showToast("提交失败，请稍后重试");
      }
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      submitQuestion(input.value);
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        submitQuestion(input.value);
      }
    });

    [
      "contactName",
      "contactInfo",
      "contactTopic",
      "contactOther"
    ].forEach((id) => document.getElementById(id).addEventListener("input", () => saveDraft(currentDraft())));

    appendWelcome();
    refreshConnection();
    loadServerProfile();
    if (location.protocol === "file:") {
      showToast("请通过域名或本地服务打开，才能连接真实后端");
      connectionState.textContent = "静态文件模式";
      statusText.textContent = "当前是 file:// 打开，无法访问真实后端。";
    }
  </script>
</body>
</html>
